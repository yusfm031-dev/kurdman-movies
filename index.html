<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Movies</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:999;
}

.menu-btn{
font-size:30px;
cursor:pointer;
}

.logo{
font-size:30px;
font-weight:bold;
margin-right:20px;
}

.search{
background:#111;
border:none;
padding:12px 20px;
border-radius:20px;
color:white;
width:150px;
}

/* HERO */

.hero{
position:relative;
height:500px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.4);
}

.hero-content{
position:absolute;
bottom:50px;
left:20px;
z-index:5;
}

.hero-content h1{
font-size:45px;
margin:0;
}

.hero-content p{
color:#ddd;
font-size:17px;
margin-top:10px;
}

.hero-btn{
margin-top:20px;
padding:14px 30px;
background:red;
border:none;
border-radius:15px;
color:white;
font-size:18px;
font-weight:bold;
}

/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px;
margin-top:-40px;
position:relative;
z-index:10;
}

.movie-card{
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.8);
}

.movie-card img{
width:100%;
height:250px;
object-fit:cover;
display:block;
}

.info{
padding:10px;
}

.rating{
display:inline-block;
background:#ffcc00;
color:#000;
padding:6px 12px;
border-radius:20px;
font-size:14px;
font-weight:bold;
margin-bottom:10px;
}

.views{
display:inline-block;
background:#222;
padding:6px 12px;
border-radius:20px;
font-size:14px;
margin-right:8px;
}

.movie-card h3{
margin:12px 0;
font-size:18px;
text-align:center;
}

.movie-card button{
width:100%;
padding:12px;
background:red;
border:none;
color:white;
font-size:17px;
font-weight:bold;
border-radius:14px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:100%;
height:auto;
}

.close-btn{
position:absolute;
top:20px;
right:20px;
background:red;
border:none;
color:white;
padding:10px 15px;
font-size:20px;
border-radius:10px;
z-index:1000000;
}

/* MOBILE */

@media(max-width:700px){

.hero{
height:350px;
}

.hero-content h1{
font-size:35px;
}

.movie-card img{
height:220px;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="menu-btn">☰</div>

<input class="search" type="text" placeholder="🔍 Search">

<div class="logo">KurdMan 🎬</div>

</div>

<!-- HERO -->

<div class="hero">

<img src="IMG_20260519_122720_858.png">

<div class="hero-content">

<h1>KurdMan Movies</h1>

<p>باشترین فیلم و زنجیرە کوردی</p>

<button class="hero-btn">
▶ Watch Now
</button>

</div>

</div>

<!-- MOVIES -->

<div class="movies-grid">

<div class="movie-card">

<img src="file_00000000e440720a9828825168bd0226.png">

<div class="info">

<div class="rating">⭐ 8.5</div>

<div class="views">👁 120K</div>

<h3>عەشق و فیتنە</h3>

<button onclick="openPopup('https://vz-5ea6d1f8-2d5.b-cdn.net/aeb5ca24-5b0d-4f87-a5a6-ef2f8d6fb168/playlist.m3u8')">
▶ Play
</button>

</div>

</div>

<div class="movie-card">

<img src="file_00000000b37872469944d35385c90010.png">

<div class="info">

<div class="rating">⭐ 8.3</div>

<div class="views">👁 95K</div>

<h3>ساوا</h3>

<button onclick="openPopup('https://vz-908031df-65a.b-cdn.net/c6810e64-9623-43c7-ad52-566b3cc1f02b/playlist.m3u8')">
▶ Play
</button>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<button class="close-btn" onclick="closePopup()">✖</button>

<video id="popupVideo" controls playsinline></video>

</div>

<script>

function openPopup(videoUrl){

document.getElementById("popup").style.display="flex";

let video=document.getElementById("popupVideo");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(videoUrl);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}else{

video.src=videoUrl;

video.play();

}

}

function closePopup(){

document.getElementById("popup").style.display="none";

document.getElementById("popupVideo").pause();

}

</script>

</body>
</html>

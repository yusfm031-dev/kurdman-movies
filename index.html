<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Movies</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
z-index:9999;
}

.logo{
font-size:26px;
font-weight:bold;
}

.menu-btn{
font-size:32px;
cursor:pointer;
}

.search{
width:150px;
padding:10px 15px;
border:none;
border-radius:30px;
background:#111;
color:white;
outline:none;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:-100%;
width:260px;
height:100%;
background:#0b0b0b;
z-index:99999;
transition:0.4s;
padding-top:80px;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:18px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#111;
}

.close-menu{
position:absolute;
top:15px;
right:15px;
font-size:30px;
cursor:pointer;
}

/* HERO */

.hero{
position:relative;
height:520px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.45);
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top,#050505,transparent);
}

.hero-content{
position:absolute;
bottom:40px;
left:20px;
z-index:5;
}

.hero-title{
font-size:45px;
font-weight:bold;
margin-bottom:10px;
}

.hero-desc{
font-size:15px;
color:#ddd;
line-height:1.7;
width:90%;
margin-bottom:20px;
}

.watch-btn{
padding:14px 28px;
background:#ff0055;
border:none;
border-radius:30px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* MOVIES */

.section-title{
font-size:26px;
font-weight:bold;
padding:20px 15px 10px;
color:#ff3355;
}

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px;
}

.movie-card{
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.7);
position:relative;
}

.movie-card img{
width:100%;
height:240px;
object-fit:cover;
display:block;
}

/* RATING */

.rating{
position:absolute;
top:10px;
left:10px;
background:#ffcc00;
color:black;
padding:5px 10px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

/* VIEWS */

.views{
position:absolute;
top:10px;
right:10px;
background:#222;
padding:5px 10px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

/* INFO */

.info{
padding:10px;
}

.info h3{
text-align:center;
font-size:17px;
margin-bottom:10px;
}

/* PLAY BUTTON */

.play-btn{
width:100%;
padding:12px;
background:linear-gradient(45deg,#ff5500,#ff0055);
border:none;
border-radius:14px;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:100%;
height:auto;
}

.close-popup{
position:absolute;
top:20px;
right:20px;
background:red;
border:none;
color:white;
padding:10px 15px;
font-size:20px;
border-radius:12px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.hero{
height:420px;
}

.hero-title{
font-size:34px;
}

.movie-card img{
height:210px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<input class="search" type="text" placeholder="🔍 Search">

</div>

<!-- SIDEBAR -->

<div id="sidebar">

<div class="close-menu" onclick="toggleMenu()">✖</div>

<a href="#">🏠 سەرەتا</a>

<a href="#">❤️ دڵخوازەکان</a>

</div>

<!-- HERO -->

<div class="hero">

<img src="IMG_20260519_122720_858.png">

<div class="hero-content">

<div class="hero-title">KurdMan Movies</div>

<div class="hero-desc">
باشترین فیلم و زنجیرە کوردی و دۆبلاژکراو
</div>

<button class="watch-btn">
▶ Watch Now
</button>

</div>

</div>

<!-- MOVIES -->

<div class="section-title">

<div class="movies-grid">

<!-- MOVIE 1 -->

<div class="info">

<button class="play-btn"
onclick="openPopup('https://vz-908031df-65a.b-cdn.net/c6810e64-9623-43c7-ad52-566b3cc1f02b/playlist.m3u8')">

<div class="movie-card">

<button class="play-btn"

<!-- MOVIE 4 -->

onclick="openPopup('https://vz-84ab955f-09b.b-cdn.net/d7aeff2c-c8ad-4e92-8400-789df53f7991/playlist.m3u8')">
▶ Play
</button>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<button class="close-popup"
onclick="closePopup()">✖</button>

<video id="popupVideo"
controls
playsinline>
</video>

</div>

<script>

/* MENU */

function toggleMenu(){

let sidebar=document.getElementById("sidebar");

if(sidebar.style.left==="0px"){

sidebar.style.left="-100%";

}else{

sidebar.style.left="0";

}

}

/* VIDEO */

function openPopup(videoUrl){

document.getElementById("popup").style.display="flex";

let video=document.getElementById("popupVideo");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(videoUrl);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}else{

video.src=videoUrl;

video.play();

}

}

function closePopup(){

document.getElementById("popup").style.display="none";

document.getElementById("popupVideo").pause();

}

/* SEARCH */

const search=document.querySelector(".search");

search.addEventListener("keyup",function(){

let value=search.value.toLowerCase();

let cards=document.querySelectorAll(".movie-card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

if(text.includes(value)){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

</script>

</body>
</html>

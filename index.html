<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Movies</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

.topbar h1{
font-size:30px;
margin:0;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.top-search{
width:45%;
padding:10px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
right:-100%;
width:250px;
height:100%;
background:#111;
transition:0.4s;
padding-top:70px;
z-index:9999;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#1f1f1f;
}

#closeBtn{
position:absolute;
top:10px;
left:10px;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
scrollbar-width:none;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:420px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
}

/* MOVIES */

.movies{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:12px;
}

.movie-card{
position:relative;
background:#111;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.7);
}

/* IMAGE */
.movie-card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}
  .movie-card h3{
padding:4px;
margin:0;
font-size:14px;
text-align:center;
background:#111;
color:white;
height:28px;
line-height:28px;
overflow:hidden;
}

.movie-card button{
width:82%;
margin:6px auto 8px;
display:block;
padding:8px;
background:red

/* RATING */

.rating{
position:absolute;
top:10px;
left:10px;
background:#ffcc00;
color:#000;
padding:6px 12px;
border-radius:12px;
font-size:15px;
font-weight:bold;
z-index:20;
}

/* VIEWS */

.views{
position:absolute;
top:10px;
right:10px;
background:#222;
color:#fff;
padding:6px 12px;
border-radius:12px;
font-size:15px;
font-weight:bold;
z-index:20;
}

/* NAME */

.movie-card h3{
padding:14px 10px;
margin:0;
font-size:20px;
text-align:center;
color:white;
background:#111;
}

/* PLAY BUTTON */

.movie-card button{
width:90%;
margin:0 auto 15px;
display:block;
padding:14px;
background:red;
border:none;
border-radius:14px;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.movie-card button:hover{
background:#ff2222;
}


/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:90%;
border-radius:15px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.movies{
grid-template-columns:repeat(2,1fr);
}

.movie-card img{
height:220px;
}

.topbar h1{
font-size:22px;
}

.top-search{
width:40%;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<button onclick="toggleMenu()">☰</button>

<input class="top-search" type="text" placeholder="🔍 Search">

<h1>KurdMan 🎬</h1>

</div>

<!-- SIDEBAR -->

<div id="sidebar">

<button id="closeBtn" onclick="toggleMenu()">✖</button>

<a href="#">🏠 سەرەتا</a>
<a href="#">🎬 فیلمەکان</a>
<a href="#">📺 زنجیرەکان</a>
<a href="#">🔥 ترێند</a>
<a href="#">💡 پێشنیارەکان</a>

</div>

<!-- SLIDER -->

<div class="slider">

<img src="IMG_20260519_122720_858.png">

<img src="IMG_20260522_140604_218.png">

<img src="IMG_20260522_140704_502.png">

<img src="IMG_20260522_140721_798.jpg">

<img src="file_0000000051487246a1b2420930fbe215.png">

<img src="file_000000005c747243afea6f664474190f.png">

<img src="file_00000000e7f0720abc4f1aa0333335d7.png">

</div>

<!-- MOVIES -->

<div class="movies-grid">

<div class="movies"></div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<button onclick="closePopup()">✖</button>

<video id="popupVideo" controls></video>

</div>

<!-- JAVASCRIPT -->

<script>

const API = "https://6a14c3a091ff9a63de0704c1.mockapi.io/movies";

/* MENU */

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.right === "0px"){

sidebar.style.right = "-100%";

}else{

sidebar.style.right = "0";

}

}

/* LOAD MOVIES */

function loadMovies(){

fetch(API)

.then(res => res.json())

.then(data => {

let moviesContainer = document.querySelector(".movies");

moviesContainer.innerHTML = "";

data.forEach(movie => {

moviesContainer.innerHTML += `

<div class="movie-card">

<div class="rating">⭐ ${movie.rating}</div>

<div class="views">👁 ${movie.views}</div>

<img src="${movie.image}">

<h3>${movie.name}</h3>

<button onclick="openPopup('${movie.video}', ${movie.id})">

▶ Play

</button>

</div>

`;

});

});

}

loadMovies();

/* PLAY VIDEO */

function openPopup(videoUrl, movieId){

document.getElementById("popup").style.display = "flex";

document.getElementById("popupVideo").src = videoUrl;

document.getElementById("popupVideo").load();

document.getElementById("popupVideo").play();

/* ADD VIEW */

fetch(API + "/" + movieId)

.then(res => res.json())

.then(movie => {

fetch(API + "/" + movieId, {

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name: movie.name,
image: movie.image,
video: movie.video,
views: Number(movie.views) + 1,
rating: movie.rating

})

})

.then(() => {

loadMovies();

});

});

}

/* CLOSE POPUP */

function closePopup(){

document.getElementById("popup").style.display = "none";

document.getElementById("popupVideo").pause();

}

/* SEARCH */

const search = document.querySelector(".top-search");

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase();

let cards = document.querySelectorAll(".movie-card");

cards.forEach(card => {

let title = card.innerText.toLowerCase();

if(title.includes(value)){

card.style.display = "flex";

}else{

card.style.display = "none";

}

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Movies</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* ===== TOP BAR ===== */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:75px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
z-index:999999;
}

.menu-btn{
width:55px;
height:55px;
border-radius:18px;
background:rgba(255,255,255,.06);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.menu-btn span{
font-size:34px;
color:white;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:22px;
font-weight:bold;
}

.search-box{
width:130px;
padding:12px 16px;
border:none;
outline:none;
border-radius:30px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
}

/* ===== SIDEBAR ===== */

#sidebar{
position:fixed;
top:0;
left:-100%;
width:82%;
height:100%;
background:#09060f;
z-index:9999999;
transition:.4s;
padding-top:110px;
}

.close-btn{
position:absolute;
top:20px;
right:20px;
font-size:45px;
cursor:pointer;
}

#sidebar a{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px;
font-size:24px;
color:white;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* ===== HERO ===== */

.hero-slider{
position:relative;
width:100%;
height:560px;
overflow:hidden;
}

.slide{
display:none;
position:absolute;
width:100%;
height:100%;
animation:fade 1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.35);
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top,#050505 10%,transparent 60%);
}

/* ===== HERO CONTENT ===== */

.hero-content{
position:absolute;
bottom:90px;
left:20px;
width:90%;
z-index:5;
}

.hero-logo{
font-size:38px;
font-weight:bold;
margin-bottom:18px;
}

.hero-title{
font-size:34px;
font-weight:bold;
margin-bottom:15px;
}

.hero-desc{
font-size:16px;
line-height:1.8;
color:#ddd;
margin-bottom:20px;
}

.hero-info{
display:flex;
gap:15px;
align-items:center;
margin-bottom:25px;
}

.hero-rating{
background:#ffb400;
padding:10px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
color:black;
}

/* ===== WATCH BTN ===== */

.watch-btn{
padding:16px 45px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff0066,#ff6600);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px rgba(255,80,0,.4);
}

/* ===== DOTS ===== */

.dots{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
background:rgba(0,0,0,.55);
padding:10px 20px;
border-radius:30px;
}

.dot{
width:10px;
height:10px;
background:#666;
border-radius:50%;
transition:.4s;
}

.active{
width:30px;
background:#ff6600;
border-radius:30px;
}

/* ===== SECTION ===== */

.section-title{
font-size:28px;
padding:25px 18px 10px;
font-weight:bold;
color:#ff3355;
}

/* ===== MOVIES ===== */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px;
}

.movie-card{
background:#0f0f0f;
border-radius:24px;
overflow:hidden;
position:relative;
box-shadow:0 0 15px rgba(0,0,0,.5);
}

.movie-image{
position:relative;
overflow:hidden;
}

.movie-image img{
width:100%;
height:270px;
object-fit:contain;
background:black;
display:block;
}

/* ===== RATING ===== */

.rating{
position:absolute;
top:10px;
left:10px;
background:#ffcc00;
padding:5px 11px;
border-radius:14px;
font-size:12px;
font-weight:bold;
color:black;
}

/* ===== VIEWS ===== */

.views{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,.7);
padding:5px 11px;
border-radius:14px;
font-size:12px;
font-weight:bold;
}

/* ===== PLAY CENTER ===== */

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:78px;
height:78px;
border-radius:50%;
background:linear-gradient(45deg,#ff0066,#ff6600);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:white;
cursor:pointer;
opacity:0;
transition:.3s;
}

.movie-image:hover .play-overlay{
opacity:1;
}

.movie-image:active .play-overlay{
opacity:1;
}

/* ===== INFO ===== */

.movie-info{
padding:14px;
}

.movie-info h3{
font-size:18px;
text-align:center;
margin-bottom:5px;
}

/* ===== POPUP ===== */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:99999999;
}

.popup video{
width:100%;
height:auto;
}

.close-popup{
position:absolute;
top:20px;
right:20px;
background:red;
border:none;
padding:10px 16px;
font-size:20px;
color:white;
border-radius:14px;
cursor:pointer;
}

@keyframes fade{
from{opacity:.4}
to{op

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:1;
box-shadow:0 0 20px red;
}

.topbar h1{
color:red;
font-size:35px;
text-shadow:0 0 15px red;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:35px;
cursor:pointer;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:-100%;
width:75%;
height:100vh;
background:#0b0717;
z-index:99999999;
transition:left 0.4s ease;
padding-top:80px;
box-shadow:0 0 30px red;
}

#sidebar a{
display:block;
padding:20px;
color:white;
text-decoration:none;
font-size:24px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

#sidebar a:hover{
background:red;
}

#closeBtn{
position:absolute;
top:15px;
right:15px;
background:red;
border:none;
color:white;
font-size:25px;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* TITLE */

.main-title{
text-align:center;
color:red;
font-size:45px;
margin-top:20px;
text-shadow:0 0 20px red;
}

/* SLIDER */

.slider{
display:flex;
gap:15px;
overflow-x:auto;
padding:15px;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:300px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
box-shadow:0 0 20px red;
}

/* SEARCH */

.search-box{
width:90%;
display:block;
margin:auto;
padding:15px;
border:none;
border-radius:15px;
background:#111;
color:white;
font-size:18px;
box-shadow:0 0 15px red;
outline:none;
}

/* MOVIE CARD */

.movie{
width:85%;
margin:25px auto;
background:#111;
padding:15px;
border-radius:20px;
box-shadow:0 0 20px red;
text-align:center;
}  
.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.movie-card{
background:#111;
border-radius:20px;
padding:10px;
box-shadow:0 0 15px red;
overflow:hidden;
}

.movie-card img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
}

.movie-card h3{
text-align:center;
color:white;
margin-top:10px;
}
}

.movie{
margin:0;
width:100%;
box-sizing:border-box;
}

.movie img{
height:260px;
object-fit:cover;
}
}

.movie h2{
color:white;
}

.movie img{
width:100%;
border-radius:15px;
margin-top:10px;
box-shadow:0 0 15px red;
}

.movie video{
width:100%;
border-radius:15px;
box-shadow:0 0 15px red;
}

.movie button{
background:red;
border:none;
color:white;
padding:10px 20px;
margin-top:10px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999999999;
}

.popup video{
width:90%;
border-radius:20px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:red;
border:none;
color:white;
font-size:20px;
padding:10px 15px;
border-radius:10px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 0 20px red;
z-index:10;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:25px;
}

.bottom-nav button:hover{
color:red;
transform:scale(1.2);
}

</style>

  <link rel="icon" type="image/png" href="logo.png">
  <meta property="og:title" content="KurdMan">

<meta property="og:description" content="Movies & Series Kurdish Website">

<meta property="og:image" content="logo.png">

<meta property="og:type" content="website">
</head>  

<body>

<!-- TOPBAR -->

<div class="topbar">

<button onclick="toggleMenu()">☰</button>

<h1>KurdMan 🎬</h1>

</div>

<!-- SIDEBAR -->

<div id="sidebar">

<button id="closeBtn" onclick="toggleMenu()">✖</button>

<a href="#">🏠 سەرەتا</a>

<a href="#">🎬 فیلمەکان</a>

<a href="#">📺 زنجیرەکان</a>

<a href="#">🔥 ترێند</a>

<a href="#">💡 پێشنیارەکان</a>

</div>

<!-- TITLE -->

<h1 class="main-title">KurdMan 🎬</h1>

<!-- SLIDER -->

<div class="slider">

<img src="https://picsum.photos/300/200?1">

<img src="https://picsum.photos/300/200?2">

<img src="https://picsum.photos/300/200?3">

<img src="https://picsum.photos/300/200?4">

</div>

<!-- SEARCH -->

<input class="search-box" type="text" placeholder="🔍 Search Movie...">

<!-- MOVIE -->

<div class="movies-grid">

<div class="movie-card">

<img src="https://picsum.photos/300/450?1">

<h3>Fast X</h3>

</div>

<div class="movie-card">

<img src="https://picsum.photos/300/450?2">

<h3>The Beekeeper</h3>

</div>

<div class="movie-card">

<img src="https://picsum.photos/300/450?3">

<h3>John Wick</h3>

</div>

<div class="movie-card">

<img src="https://picsum.photos/300/450?4">

<h3>Action Movie</h3>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<button onclick="closePopup()">✖</button>

<video id="popupVideo" controls></video>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<button>🏠</button>

<button>🔥</button>

<button>🎬</button>

<button>❤️</button>

</div>

<!-- JAVASCRIPT -->

<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px" || sidebar.style.left === "0"){

sidebar.style.left = "-100%";

}else{

sidebar.style.left = "0";

}

}

function openPopup(video){

document.getElementById("popup").style.display = "flex";

document.getElementById("popupVideo").src = video;

document.getElementById("popupVideo").play();

}

function closePopup(){

document.getElementById("popup").style.display = "none";

document.getElementById("popupVideo").pause();

}

/* AUTO SLIDER */

let slider = document.querySelector(".slider");

setInterval(function(){

slider.scrollLeft += 320;

if(slider.scrollLeft >= slider.scrollWidth - slider.clientWidth){

slider.scrollLeft = 0;

}

},3000);

</script>

</body>
</html>

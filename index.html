<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px" || sidebar.style.left === "0"){

sidebar.style.left = "-100%";

}else{

sidebar.style.left = "0";

}

}
function openPopup(videoUrl, movieId) {

document.getElementById("popup").style.display = "flex";

document.getElementById("popupVideo").src = videoUrl;
document.getElementById("popupVideo").load();
document.getElementById("popupVideo").play();
  update(ref(db, "movies/" + movieId), {
views: increment(1)
});

}
  

function closePopup(){

document.getElementById("popup").style.display = "none";

document.getElementById("popupVideo").pause();

}

/* AUTO SLIDER */

let slider = document.querySelector(".slider");

setInterval(function(){

slider.scrollLeft += 320;

if(slider.scrollLeft >= slider.scrollWidth - slider.clientWidth){

slider.scrollLeft = 0;

}

},3000);

  
const search = document.querySelector(".top-search");

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase();

let cards = document.querySelectorAll(".movie-card");

cards.forEach(card => {

let title = card.innerText.toLowerCase();

if(title.includes(value)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});
  
</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue, update, increment }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

apiKey: "AIzaSyAktAQGjVkradABOiaDz-1NJitm4btv3WQ",

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const moviesRef = ref(db, "movies");

onValue(moviesRef, (snapshot) => {

const data = snapshot.val();

  let moviesContainer = document.querySelector(".movies");

moviesContainer.innerHTML = "";

for (let key in data) {

moviesContainer.innerHTML += `

<div class="movie-card">

<div class="info-bar">

<span>⭐ ${data[key].rating}</span>

<span>👁️ ${data[key].views}</span>

</div>

<h3>${data[key].name}</h3>

</div>

`;

}

});

<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Movies</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

.topbar h1{
font-size:28px;
margin:0;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.top-search{
width:45%;
padding:10px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
right:-100%;
width:250px;
height:100%;
background:#111;
transition:0.4s;
padding-top:70px;
z-index:9999;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#1f1f1f;
}

#closeBtn{
position:absolute;
top:10px;
left:10px;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
scrollbar-width:none;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:320px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
}

/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,minmax(160px,1fr));
gap:18px;
padding:18px;
justify-content:center;
}

.movie-card{
background:#111;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.7);
max-width:190px;
margin:auto;
}

.movie-card img{
width:100%;
aspect-ratio:2/3;
object-fit:contain;
background:#111;
display:block;
}

.movie-card h3{
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
margin:0;
font-size:18px;
text-align:center;
color:white;
}

.movie-card button{
width:90%;
margin:10px auto;
display:block;
padding:10px;
background:red;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:90%;
border-radius:15px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.movies-grid{
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.movie-card img{
height:auto;
}

.topbar h1{
font-size:22px;
}

.top-search{
width:40%;
}

}

</style>
</head>

<body>

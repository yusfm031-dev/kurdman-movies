<script>

/* MENU */

function openMenu(){
document.getElementById("sidebar").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}

/* SLIDER */

let slides=document.querySelectorAll(".slide");
let dots=document.querySelectorAll(".dot");

let current=0;

function showSlide(index){

slides.forEach(slide=>{
slide.classList.remove("active-slide");
});

dots.forEach(dot=>{
dot.classList.remove("active-dot");
});

slides[index].classList.add("active-slide");

dots[index].classList.add("active-dot");

}

setInterval(()=>{

current++;

if(current >= slides.length){
current=0;
}

showSlide(current);

},4000);

/* VIDEO */

function openPopup(videoUrl){

document.getElementById("popup").style.display="flex";

let video=document.getElementById("popupVideo");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(videoUrl);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=videoUrl;

video.play();

}

}

function closePopup(){

document.getElementById("popup").style.display="none";

document.getElementById("popupVideo").pause();

}

/* SEARCH */
  
  const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

let value = searchInput.value.toLowerCase();

let cards = document.querySelectorAll(".movie-card");

cards.forEach(card => {

let text = card.innerText.toLowerCase();

if(value === ""){

card.style.display = "block";

}

else if(text.includes(value)){

card.style.display = "block";

card.scrollIntoView({
behavior:"smooth",
block:"center"
});

}

else{

card.style.display = "none";

}

});

});


const searchResults = document.getElementById("searchResults");

searchInput.addEventListener("keyup", () => {

let value = searchInput.value.toLowerCase();

if(value === ""){
searchResults.style.display="none";
searchResults.innerHTML="";
return;
}

let results = movies.filter(movie =>
movie.title.toLowerCase().includes(value)
);

searchResults.innerHTML="";

results.forEach(movie=>{

searchResults.innerHTML += `
<div class="search-item"
onclick="window.location.href='${movie.link}'">

<img src="${movie.image}">
<span>${movie.title}</span>

</div>
`;

});

searchResults.style.display =
results.length ? "block" : "none";
  

}); 
const moviesGrid = document.getElementById("moviesGrid");

movies.forEach(movie => {

let action =
movie.video.endsWith(".html")
? `window.location.href='${movie.video}'`
: `openPopup('${movie.video}')`;

moviesGrid.innerHTML += `
<div class="movie-card">

<div class="movie-image" onclick="${action}">

<img src="${movie.image}">

<div class="play-icon">▶</div>

<div class="rating">⭐ ${movie.quality}</div>

</div>

<div class="movie-info">
<h3>${movie.title}</h3>
</div>

</div>
`;
});

</script>

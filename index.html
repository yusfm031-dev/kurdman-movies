<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Movies</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* HEADER */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:75px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
z-index:99999;
border-bottom:1px solid rgba(255,255,255,.08);
}

/* MENU BUTTON */

.menu-btn{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(45deg,#ff0066,#ff9900);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
color:white;
box-shadow:0 0 18px rgba(255,0,100,.35);
transition:.3s;
}

.menu-btn:hover{
transform:scale(1.08);
}

.logo{
font-size:24px;
font-weight:bold;
color:white;
}

/* SEARCH */

.search-box{
width:45%;
height:44px;
background:#111;
border-radius:30px;
display:flex;
align-items:center;
padding:0 15px;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:15px;
}

.search-box span{
margin-left:8px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
right:-100%;
width:78%;
height:100%;
background:#080808;
z-index:999999;
padding:35px 25px;
transition:.5s;
}

.sidebar.active{
right:0;
}

.close-menu{
font-size:35px;
margin-bottom:40px;
cursor:pointer;
color:white;
}

.sidebar a{
display:flex;
align-items:center;
gap:14px;
color:white;
text-decoration:none;
font-size:22px;
margin:30px 0;
}

/* HERO */

.hero-slider{
position:relative;
width:100%;
height:540px;
overflow:hidden;
margin-top:75px;
border-bottom:3px solid #ff0055;
background:#000;
}

/* SLIDES */

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.active-slide{
opacity:1;
z-index:5;
}

/* HERO IMAGE FULL + NO ZOOM */

.slide img{
width:100%;
height:100%;

/* تەواوی وێنە دیار دەبێت */
object-fit:contain;

background:#000;

opacity:1 !important;
visibility:visible !important;

/* زووم نەکات */
transform:none !important;
scale:1 !important;
animation:none !important;
transition:none !important;
}

/* OVERLAY */

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(to top,#050505 5%,transparent 70%),
linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.15));
}

/* HERO CONTENT */

.hero-content{
position:absolute;
bottom:65px;
right:20px;
z-index:10;
width:85%;
}

/* نوسینی سەر وێنە جولاوەکان */

.hero-content h1{
font-size:28px;
font-weight:900;
margin-bottom:8px;

font-family:'Cairo',sans-serif;

background:linear-gradient(45deg,#ffffff,#ffcc70,#ff0066);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(255,255,255,.15),
0 0 18px rgba(255,0,100,.25);
}

.hero-content p{
font-size:13px;
line-height:1.8;
color:#f1f1f1;
margin-bottom:14px;

text-shadow:0 0 10px rgba(0,0,0,.8);
}

.hero-watch-btn{
padding:10px 22px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff0066,#ff9900);
color:white;
font-size:13px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(255,0,100,.45);
transition:.3s;
}

.hero-watch-btn:hover{
transform:scale(1.05);
}

/* DOTS */

.slider-dots{
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:50;
background:rgba(0,0,0,.45);
padding:10px 18px;
border-radius:30px;
backdrop-filter:blur(10px);
}

.dot{
width:10px;
height:10px;
background:#ddd;
border-radius:50%;
transition:.4s;
}

.active-dot{
width:34px;
border-radius:20px;
background:linear-gradient(45deg,#ff0066,#ff8800);
}

/* SECTION TITLE */

.section-title{
font-size:34px;
font-weight:900;
padding:28px 18px;

font-family:'Cairo',sans-serif;

background:linear-gradient(45deg,#ff0066,#ffcc00,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 20px rgba(255,0,100,.25);
}

/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:15px;
}

.movie-card{
background:#101010;
border-radius:22px;
overflow:hidden;
position:relative;
box-shadow:0 0 20px rgba(255,255,255,.05);
transition:.3s;
}

.movie-card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(255,0,100,.25);
}

.movie-image{
position:relative;
overflow:hidden;
cursor:pointer;
}

.movie-image img{
width:100%;
height:320px;
object-fit:cover;
display:block;
transition:.4s;
border-radius:20px;
opacity:1 !important;
visibility:visible !important;
}

.movie-image:hover img{
transform:scale(1.05);
}

/* PLAY */

.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:72px;
height:72px;
border-radius:50%;
background:linear-gradient(45deg,#ff0066,#ff8800);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
opacity:0;
transition:.4s;
backdrop-filter:blur(8px);
}

.movie-image:hover .play-icon{
opacity:1;
}

/* RATING */

.rating{
position:absolute;
top:10px;
left:10px;
background:#ffcc00;
padding:3px 9px;
border-radius:10px;
font-size:9px;
font-weight:bold;
color:black;
}

.views{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,.7);
padding:3px 9px;
border-radius:10px;
font-size:9px;
font-weight:bold;
}

/* MOVIE NAME */

.movie-info{
padding:14px;
text-align:center;
}

.movie-info h3{
font-size:24px;
font-weight:900;
margin-top:6px;

font-family:'Cairo',sans-serif;

letter-spacing:.5px;

background:linear-gradient(45deg,#ffffff,#ffcc70,#ff0066);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 12px rgba(255,255,255,.18),
0 0 25px rgba(255,0,100,.15);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:100%;
height:auto;
}

.close-popup{
position:absolute;
top:20px;
right:20px;
background:red;
color:white;
border:none;
padding:10px 15px;
font-size:22px;
border-radius:14px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="search-box">

<span>🔍</span>

<input type="text" placeholder="گەران..." id="searchInput">

</div>

<div class="logo">KurdMan</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="close-menu" onclick="closeMenu()">✕</div>

<a href="#">🏠 سەرەتا</a>
<a href="#">🎬 فیلمەکان</a>
<a href="#">📺 زنجیرەکان</a>
<a href="#">🔥 ترێند</a>
<a href="#">⭐ پێشنیارەکان</a>

</div>

<!-- HERO -->

<div class="hero-slider">

<div class="slide active-slide">

<img src="image_1779992223418.jpeg">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>چیشت لینەر</h1>

<p>
فیلمی کۆمیدی و سەرنج ڕاکێش کۆری
</p>

<button class="hero-watch-btn">
▶ تماشا بکە
</button>

</div>

</div>

<div class="slide">

<img src="image_1779992286895.jpeg">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>ڕۆبین هود</h1>

<p>
فیلمی ئەکشن و مێژوویی
</p>

<button class="hero-watch-btn">
▶ تماشا بکە
</button>

</div>

</div>

<div class="slide">

<img src="image_1779988565013.jpeg">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>ئاکشن .کۆمیدی .رۆمانسی</h1>

<p>
شەڕی بەهێز و ئەکشنی ئاگری
</p>

<button class="hero-watch-btn">
▶ تماشا بکە
</button>

</div>

</div>

<!-- DOTS -->

<div class="slider-dots">

<span class="dot active-dot"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

</div>

<!-- MOVIES -->

<div class="section-title">
نوێترین فیلمەکان
</div>

<div class="movies-grid" id="moviesGrid">

<div class="movie-card">

<div class="movie-image">

<img src="file_00000000e440720a9828825168bd0226.png">

<div class="play-icon">▶</div>

<div class="views">👁 120K</div>

</div>

<div class="movie-info">
<h3>عەشق و فیتنە</h3>
</div>

</div>

<div class="movie-card">

<div class="movie-image">

<img src="file_00000000b37872469944d35385c90010.png">

<div class="play-icon">▶</div>

<div class="rating">⭐ 8.3</div>

<div class="views">👁 95K</div>

</div>

<div class="movie-info">
<h3>ساوا</h3>
</div>

</div>

</div>

<script>

/* MENU */

function openMenu(){
document.getElementById("sidebar").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}

/* SLIDER */

let slides=document.querySelectorAll(".slide");
let dots=document.querySelectorAll(".dot");

let current=0;

function showSlide(index){

slides.forEach(slide=>{
slide.classList.remove("active-slide");
});

dots.forEach(dot=>{
dot.classList.remove("active-dot");
});

slides[index].classList.add("active-slide");

dots[index].classList.add("active-dot");

}

setInterval(()=>{

current++;

if(current >= slides.length){
current=0;
}

showSlide(current);

},4000);

</script>

</body>
</html>

<style>

body{
margin:0;

/* TOPBAR */

.topbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

.topbar h1{
color:white;
font-size:32px;
margin:0;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:32px;
cursor:pointer;
}
  .top-search{
width:45%;
padding:10px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
  }

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
right:-100%;
width:260px;
height:100%;
background:#111;
transition:0.4s;
padding-top:70px;
z-index:9999;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#1f1f1f;
}

#closeBtn{
position:absolute;
top:10px;
left:10px;
background:none;
border:none;
color:white;
font-size:28px;
}

/* TITLE */

.main-title{
text-align:center;
font-size:40px;
margin-top:20px;
color:white;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
scrollbar-width:none;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:320px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
}

/* SEARCH */

.search-box{
width:90%;
display:block;
margin:15px auto;
padding:15px;
background:#111;
border:none;
border-radius:30px;
color:white;
font-size:18px;
outline:none;
}

/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.movie-card{
background:#111;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px #000;
}

.movie-card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.movie-card h3{
padding:10px;
margin:0;
font-size:18px;
text-align:center;
color:white;
}
  .movie-card button{
width:90%;
margin:10px auto;
display:block;
padding:10px;
background:red;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
  }
/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:90%;
border-radius:15px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:10px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #222;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:25px;
}

</style>
</head>

<!-- JAVASCRIPT -->

<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px" || sidebar.style.left === "0"){

sidebar.style.left = "-100%";

}else{

sidebar.style.left = "0";

}

}

function openPopup(video){

document.getElementById("popup").style.display = "flex";

document.getElementById("popupVideo").src = video;

document.getElementById("popupVideo").play();

}

function closePopup(){

document.getElementById("popup").style.display = "none";

document.getElementById("popupVideo").pause();

}

/* AUTO SLIDER */

let slider = document.querySelector(".slider");

setInterval(function(){

slider.scrollLeft += 320;

if(slider.scrollLeft >= slider.scrollWidth - slider.clientWidth){

slider.scrollLeft = 0;

}

},3000);

  
const search = document.querySelector(".top-search");

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase();

let cards = document.querySelectorAll(".movie-card");

cards.forEach(card => {

let title = card.innerText.toLowerCase();

if(title.includes(value)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});
</script>

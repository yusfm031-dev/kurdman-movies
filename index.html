<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Movies</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

.topbar h1{
font-size:28px;
margin:0;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.top-search{
width:45%;
padding:10px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
right:-100%;
width:250px;
height:100%;
background:#111;
transition:0.4s;
padding-top:70px;
z-index:9999;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#1f1f1f;
}

#closeBtn{
position:absolute;
top:10px;
left:10px;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
scrollbar-width:none;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:320px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
}
/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.movie-card{
position:relative;
background:#111;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 12px rgba(0,0,0,0.7);
}

/* IMAGE */

.movie-card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
border-radius:18px 18px 0 0;
}

/* TITLE */

.movie-card h3{
padding:6px;
margin:0;
font-size:15px;
text-align:center;
background:#111;
color:white;
}

/* PLAY BUTTON */

.movie-card button{
width:82%;
margin:8px auto 12px;
display:block;
padding:8px;
background:red;
border:none;
border-radius:12px;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

/* RATING */

.rating{
position:absolute;
top:10px;
left:10px;
background:#ffcc00;
color:#000;
padding:6px 12px;
border-radius:20px;
font-size:15px;
font-weight:bold;
z-index:20;
}

/* VIEWS */

.views{
position:absolute;
top:10px;
right:10px;
background:#222;
color:#fff;
padding:6px 12px;
border-radius:20px;
font-size:15px;
font-weight:bold;
z-index:20;
}

.movie-card{
position:relative;
background:#111;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px #000;
}

.movie-card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:90%;
border-radius:15px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.movies-grid{
grid-template-columns:repeat(2,1fr);
}

.movie-card img{
height:220px;
}

.topbar h1{
font-size:22px;
}

.top-search{
width:40%;
}

}

</style>
</head>

<body>

<script>

function toggleMenu(){

let sidebar=document.getElementById("sidebar");

if(sidebar.style.right==="0px"){

sidebar.style.right="-100%";

}else{

sidebar.style.right="0";

}

}

function openPopup(videoUrl){

document.getElementById("popup").style.display="flex";

document.getElementById("popupVideo").src=videoUrl;

document.getElementById("popupVideo").load();

document.getElementById("popupVideo").play();

}

function closePopup(){

document.getElementById("popup").style.display="none";

document.getElementById("popupVideo").pause();

}

/* SEARCH */

const search=document.querySelector(".top-search");

search.addEventListener("keyup",function(){

let value=search.value.toLowerCase();

let cards=document.querySelectorAll(".movie-card");

cards.forEach(card=>{

let title=card.innerText.toLowerCase();

if(title.includes(value)){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

</script>
<script>

/* RANDOM REALISTIC VIEWS */

document.querySelectorAll(".view-count").forEach(view=>{

let random=Math.floor(Math.random()*90000)+10000;

view.innerText=random.toLocaleString();

});

/* RANDOM RATING */

document.querySelectorAll(".rate").forEach(rate=>{

let randomRate=(Math.random()*2+7).toFixed(1);

rate.innerText=randomRate;

});
  
async function addView(id){

let response = await fetch(`https://6a14c3a091ff9a63de0704c1.mockapi.io/movies/${id},{

let movie = await response.json();

let newViews = movie.views + 1;

await fetch(`https://6a14c3a091ff9a63de0704c1.mockapi.io/movies/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
views:newViews
})

});

  }
</script>

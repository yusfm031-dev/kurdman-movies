<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Movies</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

.topbar h1{
font-size:28px;
margin:0;
}

.topbar button{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.top-search{
width:45%;
padding:10px;
border:none;
border-radius:20px;
background:#1a1a1a;
color:white;
font-size:15px;
outline:none;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
right:-100%;
width:250px;
height:100%;
background:#111;
transition:0.4s;
padding-top:70px;
z-index:9999;
}

#sidebar a{
display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
}

#sidebar a:hover{
background:#1f1f1f;
}

#closeBtn{
position:absolute;
top:10px;
left:10px;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

/* SLIDER */

.slider{
display:flex;
overflow-x:auto;
gap:12px;
padding:15px;
scrollbar-width:none;
}

.slider::-webkit-scrollbar{
display:none;
}

.slider img{
width:320px;
height:180px;
object-fit:cover;
border-radius:20px;
flex:none;
}

/* MOVIES */

.movies-grid{
display:grid;
grid-template-columns:repeat(2,minmax(160px,1fr));
gap:18px;
padding:18px;
justify-content:center;
}

.movie-card{
background:#111;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.7);
max-width:190px;
margin:auto;
}

.movie-card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.movie-card h3{
min-height:55px;
display:flex;
align-items:center;
justify-content:center;
}
  .movie-card button{
width:90%;
margin:10px auto;
display:block;
padding:10px;
background:red;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
  }

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.popup video{
width:90%;
border-radius:15px;
}

.popup button{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.movies-grid{
grid-template-columns:repeat(2,1fr);
}
  .movie-card img{
height:260px;
}

.movie-card h3{
font-size:17px;
}

.movie-card button{
font-size:18px;
padding:10px;
}

.movie-card img{
height:180px;
}

.topbar h1{
font-size:22px;
}

.top-search{
width:40%;
}

}

</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

function toggleMenu(){

let sidebar=document.getElementById("sidebar");

if(sidebar.style.right==="0px"){

sidebar.style.right="-100%";

}else{

sidebar.style.right="0";

}

}

function openPopup(videoUrl){

document.getElementById("popup").style.display="flex";

let video=document.getElementById("popupVideo");

if(Hls.isSupported()){

let hls=new Hls();

hls.loadSource(videoUrl);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=videoUrl;

video.play();

}

}

function closePopup(){

document.getElementById("popup").style.display="none";

document.getElementById("popupVideo").pause();

}

/* SEARCH */

const search=document.querySelector(".top-search");

search.addEventListener("keyup",function(){

let value=search.value.toLowerCase();

let cards=document.querySelectorAll(".movie-card");

cards.forEach(card=>{

let title=card.innerText.toLowerCase();

if(title.includes(value)){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

/* LOAD VIEWS + RATING */

async function loadViews(){

for(let i=1;i<=4;i++){

let response=await fetch(`https://6a14c3a091ff9a63de0704c1.mockapi.io/movies/${i}`);

let movie=await response.json();

document.querySelectorAll(".view-count")[i-1].innerText=
Number(movie.views).toLocaleString();

document.querySelectorAll(".rate")[i-1].innerText=
movie.rating;

}

}

loadViews();

/* ADD VIEW */

async function addView(id){

try{

let response = await fetch(`https://6a14c3a091ff9a63de0704c1.mockapi.io/movies/${id}`);

let movie = await response.json();

let newViews = Number(movie.views || 0) + 1;

await fetch(`https://6a14c3a091ff9a63de0704c1.mockapi.io/movies/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
views:newViews
})

});

loadViews();

}catch(error){

console.log(error);

}

}

</script>

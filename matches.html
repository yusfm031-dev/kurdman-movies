<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Live Scores</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.header{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:25px;
color:#00ff88;
}

.match{
background:#141414;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,255,136,.2);
}

.league{
color:#00ff88;
font-size:14px;
margin-bottom:10px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.score{
font-size:26px;
color:#ffd700;
font-weight:bold;
}

.time{
margin-top:10px;
color:#bbb;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
⚽ Live Scores
</div>

<div id="matches"></div>

<script>

const API_KEY = "123";

fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsday.php?d=2026-06-09&s=Soccer`)
.then(response => response.json())
.then(data => {

const container = document.getElementById("matches");

if(!data.events){
container.innerHTML = "<h2>هیچ یارییەک نەدۆزرایەوە</h2>";
return;
}

data.events.forEach(match => {

container.innerHTML += `
<div class="match">

<div class="league">
${match.strLeague}
</div>

<div class="teams">

<div>${match.strHomeTeam}</div>

<div class="score">
VS
</div>

<div>${match.strAwayTeam}</div>

</div>

<div class="time">
${match.dateEvent} | ${match.strTime}
</div>

</div>
`;

});

})
.catch(error => {

document.getElementById("matches").innerHTML =
"<h2>هەڵەیەک ڕوویدا لە API</h2>";

console.log(error);

});

</script>

</body>
</html>

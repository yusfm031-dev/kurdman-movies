<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Live Scores</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.header{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:25px;
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

.tabs{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.tabs button{
background:#00ff88;
color:#000;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.match{
background:linear-gradient(135deg,#111,#1a1a1a);
border-radius:20px;
padding:20px;
margin-bottom:15px;
border:1px solid #00ff88;
box-shadow:0 0 15px rgba(0,255,136,.2);
}

.league{
text-align:center;
font-size:15px;
color:#00ff88;
margin-bottom:15px;
font-weight:bold;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
}

.team{
width:35%;
}

.team img{
width:80px;
height:80px;
border-radius:50%;
background:white;
padding:5px;
}

.team-name{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.score{
font-size:35px;
font-weight:bold;
color:#ffd700;
text-align:center;
}

.live-badge{
background:red;
color:white;
padding:5px 12px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.4;
}
}

.time{
margin-top:15px;
text-align:center;
color:#ccc;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">
⚽ Live Scores
</div>

<div class="tabs">
<button onclick="loadMatches('today')">📅 Today's Matches</button>
<button onclick="loadMatches('tomorrow')">📅 Tomorrow Matches</button>
</div>

<div id="matches"></div>

<script>

const API_KEY = "123";

async function getTeamLogo(teamName){

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/${API_KEY}/searchteams.php?t=${encodeURIComponent(teamName)}`
);

const data = await res.json();

if(data.teams && data.teams[0].strBadge){
return data.teams[0].strBadge;
}

}catch(e){}

return "https://cdn-icons-png.flaticon.com/512/53/53283.png";

}

function getDate(offset = 0){
const d = new Date();
d.setDate(d.getDate() + offset);
return d.toISOString().split("T")[0];
}

async function loadMatches(type){

const date = type === "tomorrow"
? getDate(1)
: getDate(0);

const container = document.getElementById("matches");

container.innerHTML = "<h2 style='text-align:center'>Loading...</h2>";

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsday.php?d=${date}&s=Soccer`
);

const data = await res.json();

container.innerHTML = "";

if(!data.events){
container.innerHTML =
"<h2 style='text-align:center'>هیچ یارییەک نەدۆزرایەوە</h2>";
return;
}

for(const match of data.events){

const homeLogo = await getTeamLogo(match.strHomeTeam);
const awayLogo = await getTeamLogo(match.strAwayTeam);

container.innerHTML += `

<div class="match">

<div class="league">
🏆 ${match.strLeague}
</div>

<div class="teams">

<div class="team">
<img src="${homeLogo}">
<div class="team-name">
${match.strHomeTeam}
</div>
</div>

<div class="score">
VS
<br>
<div class="live-badge">LIVE</div>
</div>

<div class="team">
<img src="${awayLogo}">
<div class="team-name">
${match.strAwayTeam}
</div>
</div>

</div>

<div class="time">
🕒 ${match.strTime}
<br>
📅 ${match.dateEvent}
</div>

</div>

`;

}

}catch(error){

container.innerHTML =
"<h2 style='text-align:center'>هەڵەیەک ڕوویدا</h2>";

}

}

loadMatches('today');

</script>

</body>
</html>

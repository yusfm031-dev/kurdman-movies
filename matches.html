<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Live Scores</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.header{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:25px;
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

.match{
background:#141414;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,255,136,.2);
}

.league{
color:#00ff88;
font-size:14px;
margin-bottom:10px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.score{
font-size:26px;
color:#ffd700;
font-weight:bold;
}

.time{
margin-top:10px;
color:#bbb;
text-align:center;
}
  .team{
width:35%;
}

.team img{
width:80px;
height:80px;
border-radius:50%;
background:white;
padding:5px;
}

.team-name{
font-size:20px;
font-weight:bold;
text-align:center;
}

.live-badge{
background:red;
color:white;
padding:5px 12px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-top:10px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.4;
}
}
</style>
</head>

<body>

<div class="header">
⚽ Live Scores
</div>
  

<div id="matches"></div>

<script>

const API_KEY = "123";

async function getTeamLogo(teamName){

try{

const res = await fetch(
`https://www.thesportsdb.com/api/v1/json/${API_KEY}/searchteams.php?t=${encodeURIComponent(teamName)}`
);

const data = await res.json();

if(data.teams && data.teams[0].strBadge){
return data.teams[0].strBadge;
}

}catch(e){}

return "https://cdn-icons-png.flaticon.com/512/53/53283.png";

}

fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsday.php?d=2026-06-09&s=Soccer`)
.then(response => response.json())
.then(async data => {

const container = document.getElementById("matches");

if(!data.events){
container.innerHTML = "<h2>هیچ یارییەک نەدۆزرایەوە</h2>";
return;
}

for(const match of data.events){

const homeLogo = await getTeamLogo(match.strHomeTeam);
const awayLogo = await getTeamLogo(match.strAwayTeam);

container.innerHTML += `

<div class="match">

<div class="league">
🏆 ${match.strLeague}
</div>

<div class="teams">

<div class="team">
<img src="${homeLogo}">
<div class="team-name">
${match.strHomeTeam}
</div>
</div>

<div class="score">
VS
<br>
<div class="live-badge">LIVE</div>
</div>

<div class="team">
<img src="${awayLogo}">
<div class="team-name">
${match.strAwayTeam}
</div>
</div>

</div>

<div class="time">
🕒 ${match.strTime}
<br>
📅 ${match.dateEvent}
</div>

</div>

`;

}

});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Sports</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
margin:0;
}

.header{
text-align:center;
font-size:30px;
font-weight:bold;
color:#00ff88;
margin-bottom:20px;
}

.btns{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.btns button{
background:#00ff88;
color:black;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.match{
background:#151515;
border-radius:15px;
padding:15px;
margin-bottom:15px;
border:1px solid #00ff88;
}

.league{
color:#00ff88;
text-align:center;
margin-bottom:10px;
font-weight:bold;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
}

.team{
width:35%;
}

.team img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
}

.score{
font-size:28px;
font-weight:bold;
color:gold;
}

.time{
text-align:center;
margin-top:10px;
color:#ccc;
}
</style>
</head>

<body>

<div class="header">
⚽ KurdMan Live Scores
</div>

<div class="btns">
<button onclick="loadPremierLeague()">🏆 Premier League</button>
<button onclick="loadWorldCup()">🌍 World Cup</button>
</div>

<div id="matches">
<h3 style="text-align:center">Loading...</h3>
</div>

<script>

async function loadPremierLeague(){

const container = document.getElementById("matches");

container.innerHTML = "<h3>Loading...</h3>";

try{

const res = await fetch(
"https://www.thesportsdb.com/api/v1/json/123/eventsnextleague.php?id=4328"
);

const data = await res.json();

showMatches(data.events);

}catch(e){

container.innerHTML = "<h3>هەڵەیەک ڕوویدا</h3>";

}

}

async function loadWorldCup(){

const container = document.getElementById("matches");

container.innerHTML = "<h3>Loading...</h3>";

try{

const res = await fetch(
"https://www.thesportsdb.com/api/v1/json/123/eventsnextleague.php?id=4424"
);

const data = await res.json();

showMatches(data.events);

}catch(e){

container.innerHTML = "<h3>هەڵەیەک ڕوویدا</h3>";

}

}

function showMatches(events){

const container = document.getElementById("matches");

container.innerHTML = "";

if(!events){

container.innerHTML =
"<h3>هیچ یارییەک نەدۆزرایەوە</h3>";

return;

}

events.forEach(match=>{

container.innerHTML += `

<div class="match">

<div class="league">
${match.strLeague}
</div>

<div class="teams">

<div class="team">
<img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
<div>${match.strHomeTeam}</div>
</div>

<div class="score">
VS
</div>

<div class="team">
<img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
<div>${match.strAwayTeam}</div>
</div>

</div>

<div class="time">
📅 ${match.dateEvent}
<br>
🕒 ${match.strTime}
</div>

</div>

`;

});

}

loadPremierLeague();

</script>

</body>
</html>

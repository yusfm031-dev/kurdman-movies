<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan World Cup</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:15px;
}

.header{
text-align:center;
font-size:35px;
font-weight:bold;
color:#00ff88;
margin-bottom:20px;
text-shadow:0 0 20px #00ff88;
}

.day{
font-size:24px;
font-weight:bold;
margin:25px 0 10px;
text-align:center;
color:#fff;
}

.match{
background:#141414;
border-radius:20px;
padding:18px;
margin-bottom:12px;
border:1px solid #00ff88;
box-shadow:0 0 10px rgba(0,255,136,.2);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.time{
font-size:22px;
color:#ffd700;
}

.team{
width:35%;
text-align:center;
}

.flag{
font-size:30px;
display:block;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="header">
🏆 KurdMan World Cup
</div>
<div id="matches"></div>

<script>

const API_TOKEN = "4b9eee992e174ffdb102d660eef989f7";

async function loadWorldCup() {

const container = document.getElementById("matches");
container.innerHTML = "<h2>Loading...</h2>";

try {

const res = await fetch(
"https://api.football-data.org/v4/competitions/WC/matches",
{
headers:{
"X-Auth-Token": API_TOKEN
}
}
);

const data = await res.json();

container.innerHTML = "";

data.matches.forEach(match => {

const date = new Date(match.utcDate);

container.innerHTML += `
<div class="match">

<div class="league">
🏆 FIFA World Cup
</div>

<div class="teams">
${match.homeTeam.name}
<br><br>
VS
<br><br>
${match.awayTeam.name}
</div>

<div class="time">
📅 ${date.toLocaleDateString()}
<br>
🕒 ${date.toLocaleTimeString()}
</div>

</div>
`;

});

} catch(error){

container.innerHTML =
"<h2>هەڵە لە API</h2>";

}

}

loadWorldCup();

</script>

</body>
</html>

</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan World Cup</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.header{
text-align:center;
font-size:34px;
font-weight:bold;
color:#00ff88;
margin-bottom:25px;
text-shadow:0 0 20px #00ff88;
}

.match{
background:#141414;
border:1px solid #00ff88;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,255,136,.3);
}

.league{
color:#00ff88;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
text-align:center;
}

.teams{
font-size:22px;
font-weight:bold;
text-align:center;
line-height:1.8;
}

.time{
text-align:center;
margin-top:10px;
color:#ccc;
font-size:18px;
}
</style>
</head>

<body>

<div class="header">
🏆 KurdMan World Cup
</div>

<div id="matches">
<h2 style="text-align:center;">Loading...</h2>
</div>

<script>

const API_TOKEN = "4b9eee992e174ffdb102d660eef989f7";

async function loadWorldCup() {

const container = document.getElementById("matches");

try {

const res = await fetch(
"https://api.football-data.org/v4/competitions/WC/matches",
{
headers:{
"X-Auth-Token": API_TOKEN
}
}
);

console.log(res);

const data = await res.json();

console.log(data);

container.innerHTML = "";

data.matches.forEach(match => {

const date = new Date(match.utcDate);

container.innerHTML += `
<div class="match">

<div class="league">
🏆 FIFA World Cup
</div>

<div class="teams">
${match.homeTeam.name}
<br><br>
VS
<br><br>
${match.awayTeam.name}
</div>

<div class="time">
📅 ${date.toLocaleDateString()}
<br>
🕒 ${date.toLocaleTimeString()}
</div>

</div>
`;

});

}
catch(error){

console.log(error);

container.innerHTML =
"<h2 style='text-align:center;color:red'>هەڵە لە API</h2>";

}

}

loadWorldCup();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Sports</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#0b1020;
color:white;
padding:15px;
padding-bottom:90px;
}

.title{
font-size:38px;
font-weight:bold;
margin:15px 0;
color:white;
}

.search-box{
margin:15px 0;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:#121933;
color:white;
font-size:18px;
outline:none;
}

.menu{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.menu button{
background:#121933;
border:none;
color:white;
padding:12px 20px;
border-radius:30px;
white-space:nowrap;
font-size:16px;
}

.live-btn{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff9800,#ff1744);
color:white;
font-size:18px;
font-weight:bold;
margin-bottom:20px;
}

.channels-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
}

.channel-card{
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url("worldcup.jpg");
background-size:cover;
background-position:center;
border-radius:22px;
padding:20px;
text-align:center;
border:1px solid rgba(255,255,255,.08);
}

.channel-card img{
width:90px;
height:90px;
object-fit:contain;
display:block;
margin:auto;
border-radius:20px;
}

.channel-card h3{
margin-top:15px;
font-size:22px;
}

.watch-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#6c4cff;
color:white;
font-size:17px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
right:0;
left:0;
background:#10162c;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid rgba(255,255,255,.08);
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:17px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="title">🏆 KurdMan Sports</div>

<div class="search-box">
<input type="text" placeholder="گەڕان...">
</div>

<div class="menu">
<button>Sports</button>
<button>Movies</button>
<button>Kids</button>
<button>News</button>
<button>Live TV</button>
</div>



<div class="channels-grid">

<div class="channel-card">
<img src="avatars-000074792155-cm6cy1-t240x240.jpg">

onclick="window.open('https://live.rudaw.net/hls/rudaw-tv/master.m3u8')">
▶ بینین
</button>
</div>

<div class="channel-card">
<img src="file_00000000c27c723086901cd180b4d88b.png">

<div class="channel-card">

<div class="channel-card">

</button>
</div>

<div class="channel-card">
<img src="file_000000006da871fd96ee17ad7ed8aafc.png">
<h3>beIN SPORTS</h3>
<button class="watch-btn"
onclick="window.open('https://bein-xtra-bein.amagi.tv/playlist.m3u8')">

</div>
  
  <div class="channel-card">
    <img src="file_000000006da871fd96ee17ad7ed8aafc.png">

    <button class="watch-btn"
    onclick="window.open('https://pub-b6a2e12c8294473a88fb9c317217dbbc.r2.dev/Bein2.m3u8')">

</div>

</div>

<div class="bottom-nav">
<a href="#">🏠 سەرەکی</a>

</div>

</body>
</html>

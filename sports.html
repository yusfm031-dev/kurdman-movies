<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurdMan Sports</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url("worldcup.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
padding:20px;
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
margin:25px 0;
color:#ffd700;
text-shadow:0 0 15px #ffd700;
}

.channels-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.channel-card{
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
padding:15px;
border-radius:20px;
text-align:center;
box-shadow:0 0 15px rgba(255,255,255,.15);
transition:.3s;
}

.channel-card:hover{
transform:translateY(-5px);
}

.channel-card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:15px;
}

.channel-card h3{
margin-top:10px;
font-size:22px;
}

.watch-btn{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff9800,#ff1744);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.watch-btn:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="title">
🏆 KurdMan Sports
</div>
  
  <button class="watch-btn"
onclick="location.href='matches.html'">

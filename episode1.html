<!DOCTYPE html>
<html>
<head>
<title>ئەلقەی 1</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body style="background:black;color:white;text-align:center;">

<h1>Squid Game - ئەلقەی 1</h1>

<video id="video" controls width="100%"></video>

<script>
const video = document.getElementById('video');
const videoSrc = 'https://vz-5b94d35f-a66.b-cdn.net/2044dee6-eb83-4a55-8bb5-20494272708b/playlist.m3u8';

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else {
  video.src = videoSrc;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ئەلقەی 1</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<style>
body{
background:black;
color:white;
text-align:center;
margin:0;
padding:10px;
}

h1{
font-size:22px;
}

video{
width:100%;
max-width:1000px;
}
</style>
</head>

<body>

<h1>Squid Game - ئەلقەی 1</h1>

<video id="video" controls playsinline></video>

<script>
const video = document.getElementById('video');
const videoSrc = 'https://vz-5b94d35f-a66.b-cdn.net/2044dee6-eb83-4a55-8bb5-20494272708b/playlist.m3u8';

if (Hls.isSupported()) {

const hls = new Hls();
hls.loadSource(videoSrc);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED, function() {

new Plyr(video,{
settings:['quality','speed'],
quality:{
default:1080,
options:[1080,720,360]
}
});

});

} else {

video.src = videoSrc;

new Plyr(video,{
settings:['quality','speed'],
quality:{
default:1080,
options:[1080,720,360]
}
});

}
</script>

</body>
</html>

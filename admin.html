<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KurdMan Admin</title>

<style>

body{
margin:0;
padding:20px;
background:#111827;
color:#fff;
font-family:Arial;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #333;
padding:10px;
text-align:center;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:#fff;
margin:2px;
}

.approve{
background:#16a34a;
}

.remove{
background:#dc2626;
}
  .stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
margin:25px 0;
}

.card{
background:#171b2c;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.card h3{
margin:0;
color:#ffd700;
font-size:18px;
}

.card span{
display:block;
margin-top:10px;
font-size:28px;
font-weight:bold;
color:#fff;
}
  .search-box{
margin:20px 0;
}

.search-box input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#1d2238;
color:#fff;
font-size:16px;
box-sizing:border-box;
}

.search-box input::placeholder{
color:#aaa;
}

</style>

</head>

<body>

<h1>🎬 KurdMan Admin Panel</h1>
  <div class="stats">

  <div class="card">
    <h3>👥 Users</h3>
    <span id="totalUsers">0</span>
  </div>

  <div class="card">
    <h3>👑 VIP</h3>
    <span id="vipUsers">0</span>
  </div>

  <div class="card">
    <h3>💰 Revenue</h3>
    <span>0 IQD</span>
  </div>

  <div class="card">
    <h3>⏳ Pending</h3>
    <span>0</span>
  </div>

  </div>
  <div class="search-box">
    <input
        type="text"
        id="searchUser"
        placeholder="🔍 Search username or email..."
        onkeyup="searchUsers()">
  </div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Email</th>

<th>VIP</th>

<th>Action</th>

</tr>

</thead>

<tbody id="users"></tbody>

</table>

<script>

async function loadUsers(){

const res=await fetch("https://kurdmantv.com/kurdmantv_api/get_users.php");

const users=await res.json();
  document.getElementById("totalUsers").innerText = users.length;

const vipCount = users.filter(user => user.is_vip == 1).length;
document.getElementById("vipUsers").innerText = vipCount;

let html="";
let pendingCount = 0;
users.forEach(user=>{
if (user.status == 0) {
    pendingCount++;
}
  
html+=`
<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>${user.email}</td>

<td>${user.is_vip==1?"✅":"❌"}</td>

<td>

<button class="approve"
onclick="approveVip(${user.id})">
VIP
</button>

<button class="remove"
onclick="removeVip(${user.id})">
Remove
</button>

</td>

</tr>
`;

});
  document.querySelector(".card:nth-child(4) span").innerText = pendingCount;

document.getElementById("users").innerHTML=html;

}

loadUsers();
async function approveVip(id){

const res=await fetch(
"https://kurdmantv.com/kurdmantv_api/approve_vip.php",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"id="+id
});

const data=await res.json();

alert(data.message);

loadUsers();

}

async function removeVip(id){

const res=await fetch(
"https://kurdmantv.com/kurdmantv_api/remove_vip.php",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"id="+id
});

const data=await res.json();

alert(data.message);

loadUsers();

}
  function searchUsers(){

const value=document.getElementById("searchUser").value.toLowerCase();

const rows=document.querySelectorAll("tbody tr");

rows.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)
? ""
: "none";

});

  }

</script>

</body>
</html>

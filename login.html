<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan VIP Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:90%;
max-width:380px;
background:#161b22;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

h2{
color:#fff;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#21262d;
color:#fff;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0066ff;
border:none;
border-radius:10px;
color:#fff;
font-size:17px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0052cc;
}

#msg{
margin-top:15px;
text-align:center;
color:#fff;
}

a{
color:#00aaff;
text-decoration:none;
display:block;
margin-top:15px;
text-align:center;
}
</style>

</head>
<body>

<div class="login-box">

<h2>چوونەژوورەوە</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button type="button" onclick="loginUser()">Login</button>

<div id="msg"></div>

<a href="register.html">هەژمار نییە؟ خۆت تۆمار بکە</a>

</div>

<script>
async function loginUser(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email || !password){
document.getElementById("msg").innerHTML="❌ هەموو خانەکان پڕبکە";
return;
}

try{

const response=await fetch("https://kurdmantv.com/kurdmantv_api/login.php",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:
"email="+encodeURIComponent(email)+
"&password="+encodeURIComponent(password)

});

const data=await response.json();

if(data.success){

localStorage.setItem("user",JSON.stringify(data.user));

document.getElementById("msg").innerHTML="✅ چوونەژوورەوە سەرکەوتوو بوو";
const movieId = localStorage.getItem("vipMovieId");

if(movieId){
    localStorage.removeItem("vipMovieId");
    window.location.href = "index.html?movie=" + movieId;
}else{
    window.location.href = "index.html";
}
return;

}else{

document.getElementById("msg").innerHTML="❌ "+data.message;

}

}catch(e){

document.getElementById("msg").innerHTML="❌ "+e.message;

}

}
</script>

</body>
</html>

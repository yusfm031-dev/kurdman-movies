<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Admin - Movies</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="sidebar">

<h2>🎬 KurdMan</h2>

<a href="index.html">🏠 Dashboard</a>

<a href="movies.html" class="active">🎬 Movies</a>

<a href="users.html">👥 Users</a>

<a href="payments.html">💳 Payments</a>

<a href="settings.html">⚙️ Settings</a>

</div>

<div class="main">

<h1>Movie Manager</h1>
<button id="addMovie" class="btn">
➕ Add Movie
</button>

<div id="addMovieForm" style="display:none; margin-top:20px;">

<input type="text" id="title" placeholder="Movie Title"><br><br>

<input type="text" id="poster" placeholder="Poster URL"><br><br>

<input type="text" id="video_url" placeholder="Video URL"><br><br>

<textarea id="description" placeholder="Description"></textarea><br><br>

<input type="text" id="category" placeholder="Category"><br><br>

<input type="number" id="year" placeholder="Year"><br><br>

<input type="text" id="quality" placeholder="1080p"><br><br>

<select id="vip">
    <option value="0">Free</option>
    <option value="1">VIP</option>
</select>

<br><br>

<button id="saveMovie" class="btn">
💾 Save Movie
</button>

</div>

<hr style="margin:30px 0;">

<div id="movieList">
Loading...
</div>
<script src="admin_movies.js"></script>

</div>

</body>
</html>

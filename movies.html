<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KurdMan Admin - Movies</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="container">

<h1>🎬 Movies Manager</h1>

<button id="addMovieBtn" class="btn">
➕ Add Movie
</button>

<div id="addMovieForm" style="display:none;">

<input type="text" id="title" placeholder="Movie Title">

<input type="text" id="poster" placeholder="Poster URL">

<input type="text" id="video_url" placeholder="Video URL">

<textarea id="description" placeholder="Description"></textarea>

<input type="text" id="category" placeholder="Category">

<input type="number" id="year" placeholder="Year">

<input type="text" id="quality" placeholder="1080P">

<select id="vip">
<option value="0">Free</option>
<option value="1">VIP</option>
</select>

<button id="saveMovie" class="btn">
💾 Save Movie
</button>

</div>

<hr>

<div id="movieList">

<h3>Loading...</h3>

</div>

</div>

<script src="admin_movies.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕌 نوێژ و کەش و هەوا | KurdMan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    linear-gradient(
    180deg,
    #071327 0%,
    #0b1f3d 45%,
    #020812 100%
    );
    color:#fff;
    font-family:"Cairo",sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* 🌙 مانگی جوانی شەو */
    /* 🌙 Moon */
.moon{
width:180px;
height:180px;
margin:25px auto;
border-radius:50%;
background:
radial-gradient(circle at 35% 35%,
#fff8c6,
#ffe066 55%,
#d4a000 100%);
position:relative;
box-shadow:0 0 35px rgba(255,215,0,.5);
animation:moonGlow 5s ease-in-out infinite;
}

.moon::after{
content:"";
position:absolute;
width:125px;
height:125px;
background:#071327;
border-radius:50%;
top:10px;
right:-8px;
}

@keyframes moonGlow{
0%,100%{
box-shadow:0 0 20px rgba(255,215,0,.4);
}
50%{
box-shadow:0 0 40px rgba(255,215,0,.8);
}
}

/* 📍 City */
.city-title{
text-align:center;
font-size:32px;
font-weight:700;
color:#fff;
margin:20px 0;
text-shadow:0 0 15px rgba(255,255,255,.15);
}

/* 📅 Date */
.date-box{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
padding:20px;
margin:18px 0;
text-align:center;
}

#todayDate{
font-size:34px;
font-weight:900;
color:#fff;
}

#dayName{
font-size:22px;
color:#d9e7ff;
}

/* 🕌 Prayer Cards */
.time{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#08152f,#0d2247);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
padding:22px;
margin:16px 0;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

.time span:first-child{
font-size:22px;
font-weight:700;
color:#fff;
}

.time span:last-child{
font-family:'Orbitron',sans-serif;
font-size:36px;
font-weight:900;
color:#8fe8ff;
letter-spacing:2px;
text-shadow:0 0 15px rgba(143,232,255,.4);
}

/* ⏳ Next Prayer */
#nextPrayer{
font-size:30px;
font-weight:700;
color:#ffd700;
text-align:center;
margin:15px 0;
}

#countdown{
font-family:'Orbitron',sans-serif;
font-size:28px;
font-weight:900;
color:#7cff7c;
text-align:center;
}

/* 📦 Cards */
.card{
background:rgba(20,25,40,.85);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:20px;
margin:18px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* 🕌 Main Title */
h1{
text-align:center;
font-size:38px;
font-weight:900;
margin-bottom:20px;
color:#fff;
text-shadow:0 0 20px rgba(255,255,255,.15);
}


/* 🌤️ کارتی کەش و هەوا */
#weather{
    background:
    linear-gradient(145deg,#0b1b35,#12274a);
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:#ffffff;
    text-align:center;
    padding:20px;
}


/* 📦 کارتە گشتییەکان */
.card{
background: rgba(25,25,35,0.85);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 25px;
padding: 18px;
margin: 18px;
box-shadow: 0 0 20px rgba(255,215,0,0.12);
}


/* 🕌 ناونیشانی بەشەکان */
h2{
    text-align:center;
    color:#ffffff;
    font-size:30px;
    margin-bottom:18px;
    font-weight:bold;
}

/* 🔙 دوگمەی گەڕانەوە */
.back-btn{
    color:white ;
    text-decoration:none;
    font-size:15px;
    padding:10px 15px;
    background: linear-gradient(135deg, #0d47a1, #1a237e);
    border-radius:15px;
    display:inline-block;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>

<body>

<a class="back-btn" href="index.html">
⬅ گەڕانەوە
</a>
<div class="moon"></div>
<h1>
🕌 نوێژ و کەش و هەوا
</h1>

<div class="card">

<div class="city-title" id="cityTitle">
📍 هەولێر
</div>
 
 <div class="date-box">
  📅 <span id="todayDate">بەروار...</span><br>
  🗓️ <span id="dayName">ڕۆژ...</span>
 </div>

<input 
type="text"
id="searchCity"
class="search"
placeholder="🔍 گەڕان بە ناوی شار...">


<select id="citySelect">

</select>


<div class="time">
<span>🌅 فەجر</span>
<span id="fajr">--:--</span>
</div>


<div class="time">
<span>☀️ ظەهر</span>
<span id="dhuhr">--:--</span>
</div>


<div class="time">
<span>🌇 عەسر</span>
<span id="asr">--:--</span>
</div>


<div class="time">
<span>🌙 مەغریب</span>
<span id="maghrib">--:--</span>
</div>


<div class="time">
<span>🌃 عیشا</span>
<span id="isha">--:--</span>
</div>

</div>
<div class="card">

<h2>⏳ نوێژی داهاتوو</h2>

<p id="nextPrayer">
...
</p>

<p id="countdown">
...
</p>

</div>


<div class="card">

<h2>🌤️ کەش و هەوا</h2>

<p id="weather">
...
</p>
 
</div>


<script>

const days = [
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی",
"شەممە"
];

let today = new Date();

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-GB");

document.getElementById("dayName").innerText =
days[today.getDay()];




const cities = [
{name:"هەولێر", value:"Erbil"},
{name:"سلێمانی", value:"Sulaymaniyah"},
{name:"دهۆک", value:"Duhok"},
{name:"هەڵەبجە", value:"Halabja"},
{name:"کەرکووک", value:"Kirkuk"},
{name:"زاخۆ", value:"Zakho"},
{name:"چەمچەماڵ", value:"Chamchamal"},
{name:"دەربەندیخان", value:"Darbandikhan"},
{name:"ڕانیە", value:"Ranya"},
{name:"کۆیە", value:"Koysinjaq"},
{name:"پێنجوێن", value:"Penjwen"},
{name:"ئاکرێ", value:"Akre"},
{name:"شەقڵاوە", value:"Shaqlawa"},
{name:"چۆمان", value:"Choman"},
{name:"حاجی ئۆمەران", value:"HajiOmaran"},
{name:"بەغدا", value:"Baghdad"},
{name:"بەسرا", value:"Basra"}
];





const citySelect =
document.getElementById("citySelect");


cities.forEach(city => {

let option =
document.createElement("option");

option.value = city.value;

option.textContent = city.name;

citySelect.appendChild(option);

});

 // گەڕان لە ناو شارەکان

document.getElementById("searchCity")
.addEventListener("keyup", function(){

let text = this.value.toLowerCase();

let options = citySelect.options;


for(let option of options){

option.style.display =
option.text.toLowerCase()
.includes(text)
? "block"
: "none";

}

});




// گۆڕینی شار

citySelect.addEventListener("change", ()=>{

getPrayerTimes();

getWeather();

});




// وەرگرتنی کاتەکانی نوێژ



async function getPrayerTimes(){

let city = citySelect.value;

document.getElementById("cityTitle").innerHTML =
"📍 " + citySelect.options[citySelect.selectedIndex].text;


try{

const response = await fetch("prayer-times-v2.json");
const data = await response.json();


let now = new Date();

let dateKey =
String(now.getMonth()+1).padStart(2,"0")
+ "-"
+
String(now.getDate()).padStart(2,"0");


let times = data[city][dateKey];


document.getElementById("fajr").innerText =
times.fajr;

document.getElementById("dhuhr").innerText =
times.dhuhr;

document.getElementById("asr").innerText =
times.asr;

document.getElementById("maghrib").innerText =
times.maghrib;

document.getElementById("isha").innerText =
times.isha;


showNextPrayer({

Fajr: times.fajr,

Dhuhr: times.dhuhr,

Asr: times.asr,

Maghrib: times.maghrib,

Isha: times.isha

});


}

catch(err){

console.log("Prayer JSON Error:", err);

}

 }




// کەش و هەوا

async function getWeather(){

let city = citySelect.value;


const res = await fetch(
`https://wttr.in/${city}?format=%C %t`
);


const weather =
await res.text();


document.getElementById("weather")
.innerHTML =
"🌤️ " + weather;


}

 // نوێژی داهاتوو و کات ماوە

let countdownTimer;

function showNextPrayer(times){

clearInterval(countdownTimer);


const prayers = [

["فەجر", times.Fajr],
["ظەهر", times.Dhuhr],
["عەسر", times.Asr],
["مەغریب", times.Maghrib],
["عیشا", times.Isha]

];


function updateCountdown(){

let now = new Date();

let nextName = "";
let nextDate;


for(let prayer of prayers){


let [hour, minute] =
prayer[1].split(":")
.map(Number);


let date = new Date();

date.setHours(
hour,
minute,
0,
0
);


if(date > now){

nextName = prayer[0];

nextDate = date;

break;

}


}


// ئەگەر هەموو نوێژەکانی ئەمڕۆ تەواو بووبن

if(!nextDate){

let [hour, minute] =
prayers[0][1]
.split(":")
.map(Number);


nextDate = new Date();

nextDate.setDate(
nextDate.getDate()+1
);


nextDate.setHours(
hour,
minute,
0,
0
);


nextName = prayers[0][0];

}


// ماوەی کات

let diff =
nextDate - now;


let hours =
Math.floor(diff/1000/60/60);


let minutes =
Math.floor(
(diff/1000/60)%60
);


document.getElementById("nextPrayer")
.innerHTML =
"🕌 نوێژی داهاتوو: " +
nextName;


document.getElementById("countdown")
.innerHTML =
"⏳ ماوەی ماوە: " +
hours +
" کاتژمێر و " +
minutes +
" خولەک";


}


// یەکجار نیشان بدە

updateCountdown();


// هەر یەک خولەک نوێ بکەرەوە

countdownTimer =
setInterval(
updateCountdown,
60000
);


}




// یەکەم جار بارکردنی داتا

getPrayerTimes();

getWeather();



// هەر 10 خولەک کاتەکان نوێ بکەرەوە

setInterval(()=>{

getPrayerTimes();

getWeather();

},600000);



</script>

</body>

</html>

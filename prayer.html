<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕌 نوێژ و کەش و هەوا | KurdMan</title>

<style>

   *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Cairo",sans-serif;
}

body{
    background:
    radial-gradient(circle at top, #08162e, #000);
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* ✨ ئەستێرەکان */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(2px 2px at 70% 15%, #fff, transparent),
    radial-gradient(3px 3px at 80% 45%, #fff, transparent),
    radial-gradient(2px 2px at 30% 70%, #fff, transparent),
    radial-gradient(3px 3px at 60% 80%, #fff, transparent),
    radial-gradient(2px 2px at 90% 70%, #fff, transparent);
    animation: stars 4s infinite alternate;
    z-index:-1;
}

@keyframes stars{
    from{
        opacity:.4;
    }
    to{
        opacity:1;
    }
}

/* گەڕانەوە */
.back-btn{
display:inline-block;
background:linear-gradient(45deg,#ff0066,#ff6600);
color:#fff;
padding:12px 18px;
border-radius:18px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #ff0066;
}

/* 🌙 ناونیشان */
h1{
text-align:center;
font-size:34px;
color:#fff;
margin:30px 0;
text-shadow:0 0 20px #00ffff;
}

h1::before{
content:"🌙";
display:block;
font-size:70px;
margin-bottom:5px;
filter:drop-shadow(0 0 20px #ffd700);
}
/* 🧊 کارتەکان */
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
border-radius:28px;
padding:18px;
margin:20px 0;
box-shadow:
0 0 30px rgba(0,0,0,.6);
}

/* 📍 ناوی شار */
.city-title{
text-align:center;
font-size:28px;
font-weight:bold;
color:#7df9ff;
padding:15px;
margin-bottom:18px;
text-shadow:
0 0 15px #00ffff;
}

/* 📅 بەروار و ڕۆژ */
.date-box{
background:rgba(255,255,255,.06);
border-radius:20px;
padding:18px;
text-align:center;
font-size:20px;
line-height:2;
color:#ffffff;
margin-bottom:18px;
border:1px solid rgba(255,255,255,.1);
}

/* 🔍 خانەی گەڕان */
.search{
width:100%;
height:50px;
background:#111827;
border:1px solid #374151;
border-radius:18px;
color:white;
font-size:18px;
padding:0 15px;
margin-bottom:15px;
outline:none;
}

.search::placeholder{
color:#9ca3af;
}

/* 📋 لیستی شار */
#citySelect{
width:100%;
height:50px;
background:#111827;
color:white;
font-size:18px;
border-radius:18px;
border:1px solid #374151;
padding:0 12px;
outline:none;
}

/* کاتێک دەستی لێ دەکەویت */
.search:focus,
#citySelect:focus{
border-color:#00ffff;
box-shadow:
0 0 15px #00ffff;
}
/* 🕌 کاتەکانی نوێژ */
.time{
background:
linear-gradient(145deg,#151515,#252525);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
padding:18px 25px;
margin:14px 0;
display:flex;
justify-content:space-between;
align-items:center;
font-size:24px;
font-weight:bold;
color:#fff;
box-shadow:
0 0 20px rgba(0,255,255,.18);
transition:.3s;
}

.time:hover{
transform:scale(1.03);
box-shadow:
0 0 30px #00ffff;
}

/* ⏰ ژمارەی کات */
.time span:last-child{
font-size:18px;
color:#7df9ff;
text-shadow:
0 0 10px #00ffff;
}

/* 🕌 ناوی نوێژ */
.time span:first-child{
font-size:28px;
color:#ffffff;
}


/* ⏳ نوێژی داهاتوو */
#nextPrayer{
font-size:30px;
color:#00ffff;
text-align:center;
font-weight:bold;
text-shadow:
0 0 15px #00ffff;
margin:15px 0;
}


/* ⌛ کات ماوە */
#countdown{
font-size:22px;
text-align:center;
color:#00ff80;
font-weight:bold;
text-shadow:
0 0 10px #00ff80;
}


/* 🌤️ کەش و هەوا */
#weather{
text-align:center;
font-size:28px;
color:#fff;
padding:25px;
border-radius:25px;
background:
linear-gradient(145deg,#0b1220,#1f2937);
box-shadow:
0 0 25px rgba(0,255,255,.25);
text-shadow:
0 0 10px #ffffff;
}


/* 🌟 هەڵچوونە سادە */
@keyframes glow{
0%{opacity:.7;}
50%{opacity:1;}
100%{opacity:.7;}
}

.moon{
animation:glow 3s infinite;
 }

</style>

</head>

<body>

<a class="back-btn" href="index.html">
⬅ گەڕانەوە
</a>

<h1>
🕌 نوێژ و کەش و هەوا
</h1>

<div class="card">

<div class="city-title" id="cityTitle">
📍 هەولێر
</div>
 
 <div class="date-box">
  📅 <span id="todayDate">بەروار...</span><br>
  🗓️ <span id="dayName">ڕۆژ...</span>
 </div>

<input 
type="text"
id="searchCity"
class="search"
placeholder="🔍 گەڕان بە ناوی شار...">


<select id="citySelect">

</select>


<div class="time">
<span>🌅 فەجر</span>
<span id="fajr">--:--</span>
</div>


<div class="time">
<span>☀️ ظەهر</span>
<span id="dhuhr">--:--</span>
</div>


<div class="time">
<span>🌇 عەسر</span>
<span id="asr">--:--</span>
</div>


<div class="time">
<span>🌙 مەغریب</span>
<span id="maghrib">--:--</span>
</div>


<div class="time">
<span>🌃 عیشا</span>
<span id="isha">--:--</span>
</div>

</div>
<div class="card">

<h2>⏳ نوێژی داهاتوو</h2>

<p id="nextPrayer">
...
</p>

<p id="countdown">
...
</p>

</div>


<div class="card">

<h2>🌤️ کەش و هەوا</h2>

<p id="weather">
...
</p>
 
</div>


<script>

const days = [
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی",
"شەممە"
];

let today = new Date();

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-GB");

document.getElementById("dayName").innerText =
days[today.getDay()];




const cities = [
{name:"هەولێر", value:"Erbil"},
{name:"سلێمانی", value:"Sulaymaniyah"},
{name:"دهۆک", value:"Duhok"},
{name:"هەڵەبجە", value:"Halabja"},
{name:"کەرکووک", value:"Kirkuk"},
{name:"زاخۆ", value:"Zakho"},
{name:"چەمچەماڵ", value:"Chamchamal"},
{name:"دەربەندیخان", value:"Darbandikhan"},
{name:"ڕانیە", value:"Ranya"},
{name:"کۆیە", value:"Koysinjaq"},
{name:"پێنجوێن", value:"Penjwen"},
{name:"ئاکرێ", value:"Akre"},
{name:"شەقڵاوە", value:"Shaqlawa"},
{name:"چۆمان", value:"Choman"},
{name:"حاجی ئۆمەران", value:"HajiOmaran"},
{name:"بەغدا", value:"Baghdad"},
{name:"بەسرا", value:"Basra"}
];





const citySelect =
document.getElementById("citySelect");


cities.forEach(city => {

let option =
document.createElement("option");

option.value = city.value;

option.textContent = city.name;

citySelect.appendChild(option);

});

 // گەڕان لە ناو شارەکان

document.getElementById("searchCity")
.addEventListener("keyup", function(){

let text = this.value.toLowerCase();

let options = citySelect.options;


for(let option of options){

option.style.display =
option.text.toLowerCase()
.includes(text)
? "block"
: "none";

}

});




// گۆڕینی شار

citySelect.addEventListener("change", ()=>{

getPrayerTimes();

getWeather();

});




// وەرگرتنی کاتەکانی نوێژ



async function getPrayerTimes(){

let city = citySelect.value;

document.getElementById("cityTitle").innerHTML =
"📍 " + citySelect.options[citySelect.selectedIndex].text;


try{

const response = await fetch("prayer-times-v2.json");
const data = await response.json();


let now = new Date();

let dateKey =
String(now.getMonth()+1).padStart(2,"0")
+ "-"
+
String(now.getDate()).padStart(2,"0");


let times = data[city][dateKey];


document.getElementById("fajr").innerText =
times.fajr;

document.getElementById("dhuhr").innerText =
times.dhuhr;

document.getElementById("asr").innerText =
times.asr;

document.getElementById("maghrib").innerText =
times.maghrib;

document.getElementById("isha").innerText =
times.isha;


showNextPrayer({

Fajr: times.fajr,

Dhuhr: times.dhuhr,

Asr: times.asr,

Maghrib: times.maghrib,

Isha: times.isha

});


}

catch(err){

console.log("Prayer JSON Error:", err);

}

 }




// کەش و هەوا

async function getWeather(){

let city = citySelect.value;


const res = await fetch(
`https://wttr.in/${city}?format=%C %t`
);


const weather =
await res.text();


document.getElementById("weather")
.innerHTML =
"🌤️ " + weather;


}

 // نوێژی داهاتوو و کات ماوە

let countdownTimer;

function showNextPrayer(times){

clearInterval(countdownTimer);


const prayers = [

["فەجر", times.Fajr],
["ظەهر", times.Dhuhr],
["عەسر", times.Asr],
["مەغریب", times.Maghrib],
["عیشا", times.Isha]

];


function updateCountdown(){

let now = new Date();

let nextName = "";
let nextDate;


for(let prayer of prayers){


let [hour, minute] =
prayer[1].split(":")
.map(Number);


let date = new Date();

date.setHours(
hour,
minute,
0,
0
);


if(date > now){

nextName = prayer[0];

nextDate = date;

break;

}


}


// ئەگەر هەموو نوێژەکانی ئەمڕۆ تەواو بووبن

if(!nextDate){

let [hour, minute] =
prayers[0][1]
.split(":")
.map(Number);


nextDate = new Date();

nextDate.setDate(
nextDate.getDate()+1
);


nextDate.setHours(
hour,
minute,
0,
0
);


nextName = prayers[0][0];

}


// ماوەی کات

let diff =
nextDate - now;


let hours =
Math.floor(diff/1000/60/60);


let minutes =
Math.floor(
(diff/1000/60)%60
);


document.getElementById("nextPrayer")
.innerHTML =
"🕌 نوێژی داهاتوو: " +
nextName;


document.getElementById("countdown")
.innerHTML =
"⏳ ماوەی ماوە: " +
hours +
" کاتژمێر و " +
minutes +
" خولەک";


}


// یەکجار نیشان بدە

updateCountdown();


// هەر یەک خولەک نوێ بکەرەوە

countdownTimer =
setInterval(
updateCountdown,
60000
);


}




// یەکەم جار بارکردنی داتا

getPrayerTimes();

getWeather();



// هەر 10 خولەک کاتەکان نوێ بکەرەوە

setInterval(()=>{

getPrayerTimes();

getWeather();

},600000);



</script>

</body>

</html>

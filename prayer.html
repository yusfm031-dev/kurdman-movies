<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕌 نوێژ و کەش و هەوا | KurdMan</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(180deg,#020617 0%,#08152f 45%,#000 100%);
color:#fff;
min-height:100vh;
overflow-x:hidden;
padding:15px;
position:relative;
}

/* Stars */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:320px;
pointer-events:none;
background:
radial-gradient(2px 2px at 8% 18%,#fff,transparent),
radial-gradient(2px 2px at 18% 8%,#fff,transparent),
radial-gradient(1px 1px at 28% 25%,#fff,transparent),
radial-gradient(2px 2px at 40% 15%,#fff,transparent),
radial-gradient(1px 1px at 52% 28%,#fff,transparent),
radial-gradient(2px 2px at 68% 12%,#fff,transparent),
radial-gradient(1px 1px at 80% 22%,#fff,transparent),
radial-gradient(2px 2px at 92% 10%,#fff,transparent);
animation:twinkle 5s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:.4}
50%{opacity:1}
}

/* Moon */

.moon{
width:95px;
height:95px;
margin:20px auto;
border-radius:50%;
background:radial-gradient(circle at 35% 35%,#fff8c4,#ffe066 60%,#ffcc00 100%);
position:relative;
box-shadow:0 0 35px rgba(255,215,0,.6);
animation:moonGlow 5s infinite;
}

.moon::after{
content:"";
position:absolute;
width:68px;
height:68px;
background:#020617;
border-radius:50%;
top:3px;
right:-8px;
}

@keyframes moonGlow{
0%,100%{box-shadow:0 0 20px rgba(255,215,0,.4)}
50%{box-shadow:0 0 40px rgba(255,215,0,.8)}
}

/* Back Button */

.back-btn{
display:inline-block;
padding:12px 18px;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
text-decoration:none;
color:#fff;
font-weight:700;
margin-bottom:15px;
}

/* Main Title */

h1{
text-align:center;
font-size:38px;
font-weight:900;
margin:10px 0 20px;
text-shadow:0 0 20px rgba(255,255,255,.15);
}

/* Cards */

.card{
background:rgba(10,15,30,.88);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:20px;
margin:18px 0;
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* City */

.city-title{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

/* Date */

.date-box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:20px;
text-align:center;
margin-bottom:18px;
}

#todayDate{
display:block;
font-family:'Orbitron',sans-serif;
font-size:42px;
font-weight:900;
}

#dayName{
font-size:22px;
color:#cbd5e1;
}

/* Search + Select */

.search,
select{
width:100%;
height:58px;
background:#0f172a;
color:#fff;
border:1px solid #1f3d7a;
border-radius:18px;
padding:0 15px;
font-size:18px;
margin-bottom:15px;
outline:none;
}

/* Prayer Cards */

.time{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#08152f,#0d2247);
border-radius:24px;
padding:22px;
margin:15px 0;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.time span:first-child{
font-size:24px;
font-weight:700;
}

.time span:last-child{
font-family:'Orbitron',sans-serif;
font-size:36px;
font-weight:900;
color:#8fe8ff;
letter-spacing:2px;
text-shadow:0 0 15px rgba(143,232,255,.45);
}

/* Section Titles */

h2{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:18px;
}

/* Next Prayer */

#nextPrayer{
font-size:28px;
font-weight:900;
text-align:center;
color:#ffd700;
margin-bottom:12px;
}

#countdown{
font-family:'Orbitron',sans-serif;
font-size:26px;
font-weight:900;
text-align:center;
color:#7cff7c;
}

/* Weather */

#weather{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
border-radius:25px;
padding:25px;
font-size:28px;
font-weight:700;
text-align:center;
box-shadow:0 0 25px rgba(59,130,246,.25);
    }

</style>

</head>

<body>

<a class="back-btn" href="index.html">
⬅ گەڕانەوە
</a>
<div class="moon"></div>
<h1>
🕌 نوێژ و کەش و هەوا
</h1>

<div class="card">

<div class="city-title" id="cityTitle">
📍 هەولێر
</div>
 
 <div class="date-box">
  📅 <span id="todayDate">بەروار...</span><br>
  🗓️ <span id="dayName">ڕۆژ...</span>
 </div>

<input 
type="text"
id="searchCity"
class="search"
placeholder="🔍 گەڕان بە ناوی شار...">


<select id="citySelect">

</select>


<div class="time">
<span>🌅 فەجر</span>
<span id="fajr">--:--</span>
</div>


<div class="time">
<span>☀️ ظەهر</span>
<span id="dhuhr">--:--</span>
</div>


<div class="time">
<span>🌇 عەسر</span>
<span id="asr">--:--</span>
</div>


<div class="time">
<span>🌙 مەغریب</span>
<span id="maghrib">--:--</span>
</div>


<div class="time">
<span>🌃 عیشا</span>
<span id="isha">--:--</span>
</div>

</div>
<div class="card">

<h2>⏳ نوێژی داهاتوو</h2>

<p id="nextPrayer">
...
</p>

<p id="countdown">
...
</p>

</div>


<div class="card">

<h2>🌤️ کەش و هەوا</h2>

<p id="weather">
...
</p>
 
</div>


<script>

const days = [
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی",
"شەممە"
];

let today = new Date();

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-GB");

document.getElementById("dayName").innerText =
days[today.getDay()];




const cities = [
{name:"هەولێر", value:"Erbil"},
{name:"سلێمانی", value:"Sulaymaniyah"},
{name:"دهۆک", value:"Duhok"},
{name:"هەڵەبجە", value:"Halabja"},
{name:"کەرکووک", value:"Kirkuk"},
{name:"زاخۆ", value:"Zakho"},
{name:"چەمچەماڵ", value:"Chamchamal"},
{name:"دەربەندیخان", value:"Darbandikhan"},
{name:"ڕانیە", value:"Ranya"},
{name:"کۆیە", value:"Koysinjaq"},
{name:"پێنجوێن", value:"Penjwen"},
{name:"ئاکرێ", value:"Akre"},
{name:"شەقڵاوە", value:"Shaqlawa"},
{name:"چۆمان", value:"Choman"},
{name:"حاجی ئۆمەران", value:"HajiOmaran"},
{name:"بەغدا", value:"Baghdad"},
{name:"بەسرا", value:"Basra"}
];





const citySelect =
document.getElementById("citySelect");


cities.forEach(city => {

let option =
document.createElement("option");

option.value = city.value;

option.textContent = city.name;

citySelect.appendChild(option);

});

 // گەڕان لە ناو شارەکان

document.getElementById("searchCity")
.addEventListener("keyup", function(){

let text = this.value.toLowerCase();

let options = citySelect.options;


for(let option of options){

option.style.display =
option.text.toLowerCase()
.includes(text)
? "block"
: "none";

}

});




// گۆڕینی شار

citySelect.addEventListener("change", ()=>{

getPrayerTimes();

getWeather();

});




// وەرگرتنی کاتەکانی نوێژ



async function getPrayerTimes(){

let city = citySelect.value;

document.getElementById("cityTitle").innerHTML =
"📍 " + citySelect.options[citySelect.selectedIndex].text;


try{

const response = await fetch("prayer-times-v2.json");
const data = await response.json();


let now = new Date();

let dateKey =
String(now.getMonth()+1).padStart(2,"0")
+ "-"
+
String(now.getDate()).padStart(2,"0");


let times = data[city][dateKey];


document.getElementById("fajr").innerText =
times.fajr;

document.getElementById("dhuhr").innerText =
times.dhuhr;

document.getElementById("asr").innerText =
times.asr;

document.getElementById("maghrib").innerText =
times.maghrib;

document.getElementById("isha").innerText =
times.isha;


showNextPrayer({

Fajr: times.fajr,

Dhuhr: times.dhuhr,

Asr: times.asr,

Maghrib: times.maghrib,

Isha: times.isha

});


}

catch(err){

console.log("Prayer JSON Error:", err);

}

 }




// کەش و هەوا

async function getWeather(){

let city = citySelect.value;


const res = await fetch(
`https://wttr.in/${city}?format=%C %t`
);


const weather =
await res.text();


document.getElementById("weather")
.innerHTML =
"🌤️ " + weather;


}

 // نوێژی داهاتوو و کات ماوە

let countdownTimer;

function showNextPrayer(times){

clearInterval(countdownTimer);


const prayers = [

["فەجر", times.Fajr],
["ظەهر", times.Dhuhr],
["عەسر", times.Asr],
["مەغریب", times.Maghrib],
["عیشا", times.Isha]

];


function updateCountdown(){

let now = new Date();

let nextName = "";
let nextDate;


for(let prayer of prayers){


let [hour, minute] =
prayer[1].split(":")
.map(Number);


let date = new Date();

date.setHours(
hour,
minute,
0,
0
);


if(date > now){

nextName = prayer[0];

nextDate = date;

break;

}


}


// ئەگەر هەموو نوێژەکانی ئەمڕۆ تەواو بووبن

if(!nextDate){

let [hour, minute] =
prayers[0][1]
.split(":")
.map(Number);


nextDate = new Date();

nextDate.setDate(
nextDate.getDate()+1
);


nextDate.setHours(
hour,
minute,
0,
0
);


nextName = prayers[0][0];

}


// ماوەی کات

let diff =
nextDate - now;


let hours =
Math.floor(diff/1000/60/60);


let minutes =
Math.floor(
(diff/1000/60)%60
);


document.getElementById("nextPrayer")
.innerHTML =
"🕌 نوێژی داهاتوو: " +
nextName;


document.getElementById("countdown")
.innerHTML =
"⏳ ماوەی ماوە: " +
hours +
" کاتژمێر و " +
minutes +
" خولەک";


}


// یەکجار نیشان بدە

updateCountdown();


// هەر یەک خولەک نوێ بکەرەوە

countdownTimer =
setInterval(
updateCountdown,
60000
);


}




// یەکەم جار بارکردنی داتا

getPrayerTimes();

getWeather();



// هەر 10 خولەک کاتەکان نوێ بکەرەوە

setInterval(()=>{

getPrayerTimes();

getWeather();

},600000);



</script>

</body>

</html>

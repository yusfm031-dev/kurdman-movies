<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕌 نوێژ و کەش و هەوا | KurdMan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    linear-gradient(
    180deg,
    #071327 0%,
    #0b1f3d 45%,
    #020812 100%
    );
    color:#fff;
    font-family:"Cairo",sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* 🌙 مانگ */
.moon{
    width:110px;
    height:110px;
    margin:35px auto 20px;
    border-radius:50%;
    background:
    radial-gradient(circle at 35% 35%,
    #fff7b5,
    #ffd700 55%,
    #d99a00 90%);
    box-shadow:
    0 0 25px rgba(255,220,0,.6);
    position:relative;
}

/* هلالی مانگ */
.moon::after{
    content:"";
    position:absolute;
    width:85px;
    height:85px;
    background:#081528;
    border-radius:50%;
    top:5px;
    right:-5px;
}
/* ✨ ئەستێرە بچووک و نەرمی شەو */
body::before{
content:"· ✦ · ✦ · ✦ · ✦ · ✦ ·";
position:fixed;
top:50px;
left:0;
width:100%;
text-align:center;
font-size:12px;
color:#fff;
opacity:0.5;
letter-spacing:55px;
pointer-events:none;
animation:twinkle 2.5s ease-in-out infinite;
}

@keyframes twinkle{
0%,100%{
opacity:0.2;
}

50%{
opacity:0.9;
}
}


/* 🕌 کارتی کاتەکانی نوێژ */
.time{
    background:
    linear-gradient(145deg,#10131f,#1b2030);
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    padding:18px 22px;
    margin:15px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#fff;
}

/* ⏰ کات */
.time span:last-child{
    font-size:28px;
    font-weight:bold;
    color:#9eefff;
}

/* 🕌 ناوی نوێژ */
.time span:first-child{
    font-size:22px;
    font-weight:600;
    color:#ffffff;
} 
/* 📍 ناوی شار */
.city-title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#e8faff;
    margin:20px 0;
}


/* 📅 کارتی بەروار */
.date-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:22px;
    padding:18px;
    margin:18px 0;
    text-align:center;
    color:#fff;
}

#todayDate{
    font-size:30px;
    font-weight:bold;
    display:block;
    margin-bottom:10px;
}

#dayName{
    font-size:22px;
    color:#d9e7ff;
}


/* 🔍 خانەی گەڕان */
.search{
    width:100%;
    height:55px;
    background:#071325;
    color:white;
    border:1px solid #233b5e;
    border-radius:18px;
    padding:0 18px;
    font-size:18px;
    margin:15px 0;
    outline:none;
}


/* 📋 هەڵبژاردنی شار */
#citySelect{
    width:100%;
    height:55px;
    background:#071325;
    color:#fff;
    border:1px solid #233b5e;
    border-radius:18px;
    padding:0 15px;
    font-size:18px;
    outline:none;
    cursor:pointer;
    }
/* ⏳ کارتی نوێژی داهاتوو */
#nextPrayer{
    font-size:26px;
    color:#ffd700;
    font-weight:bold;
    text-align:center;
    margin:15px 0;
}

/* ⌛ کاتی ماوە */
#countdown{
    font-size:22px;
    color:#7cff7c;
    text-align:center;
    font-weight:600;
    margin-bottom:15px;
}


/* 🌤️ کارتی کەش و هەوا */
#weather{
    background:
    linear-gradient(145deg,#0b1b35,#12274a);
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:#ffffff;
    text-align:center;
    padding:20px;
}


/* 📦 کارتە گشتییەکان */
.card{
    background:
    rgba(255,255,255,0.03);
    border-radius:28px;
    padding:20px;
    margin:20px 0;
}


/* 🕌 ناونیشانی بەشەکان */
h2{
    text-align:center;
    color:#ffffff;
    font-size:30px;
    margin-bottom:18px;
    font-weight:bold;
}


/* 🔙 دوگمەی گەڕانەوە */
.back-btn{
    color:white;
    text-decoration:none;
    font-size:20px;
    padding:10px 18px;
    background:#101827;
    border-radius:15px;
    display:inline-block;
}
</style>

</head>

<body>

<a class="back-btn" href="index.html">
⬅ گەڕانەوە
</a>
<div class="moon"></div>
<h1>
🕌 نوێژ و کەش و هەوا
</h1>

<div class="card">

<div class="city-title" id="cityTitle">
📍 هەولێر
</div>
 
 <div class="date-box">
  📅 <span id="todayDate">بەروار...</span><br>
  🗓️ <span id="dayName">ڕۆژ...</span>
 </div>

<input 
type="text"
id="searchCity"
class="search"
placeholder="🔍 گەڕان بە ناوی شار...">


<select id="citySelect">

</select>


<div class="time">
<span>🌅 فەجر</span>
<span id="fajr">--:--</span>
</div>


<div class="time">
<span>☀️ ظەهر</span>
<span id="dhuhr">--:--</span>
</div>


<div class="time">
<span>🌇 عەسر</span>
<span id="asr">--:--</span>
</div>


<div class="time">
<span>🌙 مەغریب</span>
<span id="maghrib">--:--</span>
</div>


<div class="time">
<span>🌃 عیشا</span>
<span id="isha">--:--</span>
</div>

</div>
<div class="card">

<h2>⏳ نوێژی داهاتوو</h2>

<p id="nextPrayer">
...
</p>

<p id="countdown">
...
</p>

</div>


<div class="card">

<h2>🌤️ کەش و هەوا</h2>

<p id="weather">
...
</p>
 
</div>


<script>

const days = [
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی",
"شەممە"
];

let today = new Date();

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-GB");

document.getElementById("dayName").innerText =
days[today.getDay()];




const cities = [
{name:"هەولێر", value:"Erbil"},
{name:"سلێمانی", value:"Sulaymaniyah"},
{name:"دهۆک", value:"Duhok"},
{name:"هەڵەبجە", value:"Halabja"},
{name:"کەرکووک", value:"Kirkuk"},
{name:"زاخۆ", value:"Zakho"},
{name:"چەمچەماڵ", value:"Chamchamal"},
{name:"دەربەندیخان", value:"Darbandikhan"},
{name:"ڕانیە", value:"Ranya"},
{name:"کۆیە", value:"Koysinjaq"},
{name:"پێنجوێن", value:"Penjwen"},
{name:"ئاکرێ", value:"Akre"},
{name:"شەقڵاوە", value:"Shaqlawa"},
{name:"چۆمان", value:"Choman"},
{name:"حاجی ئۆمەران", value:"HajiOmaran"},
{name:"بەغدا", value:"Baghdad"},
{name:"بەسرا", value:"Basra"}
];





const citySelect =
document.getElementById("citySelect");


cities.forEach(city => {

let option =
document.createElement("option");

option.value = city.value;

option.textContent = city.name;

citySelect.appendChild(option);

});

 // گەڕان لە ناو شارەکان

document.getElementById("searchCity")
.addEventListener("keyup", function(){

let text = this.value.toLowerCase();

let options = citySelect.options;


for(let option of options){

option.style.display =
option.text.toLowerCase()
.includes(text)
? "block"
: "none";

}

});




// گۆڕینی شار

citySelect.addEventListener("change", ()=>{

getPrayerTimes();

getWeather();

});




// وەرگرتنی کاتەکانی نوێژ



async function getPrayerTimes(){

let city = citySelect.value;

document.getElementById("cityTitle").innerHTML =
"📍 " + citySelect.options[citySelect.selectedIndex].text;


try{

const response = await fetch("prayer-times-v2.json");
const data = await response.json();


let now = new Date();

let dateKey =
String(now.getMonth()+1).padStart(2,"0")
+ "-"
+
String(now.getDate()).padStart(2,"0");


let times = data[city][dateKey];


document.getElementById("fajr").innerText =
times.fajr;

document.getElementById("dhuhr").innerText =
times.dhuhr;

document.getElementById("asr").innerText =
times.asr;

document.getElementById("maghrib").innerText =
times.maghrib;

document.getElementById("isha").innerText =
times.isha;


showNextPrayer({

Fajr: times.fajr,

Dhuhr: times.dhuhr,

Asr: times.asr,

Maghrib: times.maghrib,

Isha: times.isha

});


}

catch(err){

console.log("Prayer JSON Error:", err);

}

 }




// کەش و هەوا

async function getWeather(){

let city = citySelect.value;


const res = await fetch(
`https://wttr.in/${city}?format=%C %t`
);


const weather =
await res.text();


document.getElementById("weather")
.innerHTML =
"🌤️ " + weather;


}

 // نوێژی داهاتوو و کات ماوە

let countdownTimer;

function showNextPrayer(times){

clearInterval(countdownTimer);


const prayers = [

["فەجر", times.Fajr],
["ظەهر", times.Dhuhr],
["عەسر", times.Asr],
["مەغریب", times.Maghrib],
["عیشا", times.Isha]

];


function updateCountdown(){

let now = new Date();

let nextName = "";
let nextDate;


for(let prayer of prayers){


let [hour, minute] =
prayer[1].split(":")
.map(Number);


let date = new Date();

date.setHours(
hour,
minute,
0,
0
);


if(date > now){

nextName = prayer[0];

nextDate = date;

break;

}


}


// ئەگەر هەموو نوێژەکانی ئەمڕۆ تەواو بووبن

if(!nextDate){

let [hour, minute] =
prayers[0][1]
.split(":")
.map(Number);


nextDate = new Date();

nextDate.setDate(
nextDate.getDate()+1
);


nextDate.setHours(
hour,
minute,
0,
0
);


nextName = prayers[0][0];

}


// ماوەی کات

let diff =
nextDate - now;


let hours =
Math.floor(diff/1000/60/60);


let minutes =
Math.floor(
(diff/1000/60)%60
);


document.getElementById("nextPrayer")
.innerHTML =
"🕌 نوێژی داهاتوو: " +
nextName;


document.getElementById("countdown")
.innerHTML =
"⏳ ماوەی ماوە: " +
hours +
" کاتژمێر و " +
minutes +
" خولەک";


}


// یەکجار نیشان بدە

updateCountdown();


// هەر یەک خولەک نوێ بکەرەوە

countdownTimer =
setInterval(
updateCountdown,
60000
);


}




// یەکەم جار بارکردنی داتا

getPrayerTimes();

getWeather();



// هەر 10 خولەک کاتەکان نوێ بکەرەوە

setInterval(()=>{

getPrayerTimes();

getWeather();

},600000);



</script>

</body>

</html>

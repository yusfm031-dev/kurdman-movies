<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نوێژ و کەش و هەوا - KurdMan</title>
<style>
body{background:#0b0b0b;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#151515;padding:20px;border-radius:16px;margin:15px 0}
select{width:100%;padding:12px;border-radius:10px}
.time{padding:10px 0;border-bottom:1px solid #333}
</style>
</head>
<body>
<h1>🕌 نوێژ و کەش و هەوا</h1>

<div class="card">
<select id="citySelect" onchange="getPrayerTimes()">
<option value="Erbil">هەولێر</option>
<option value="Sulaymaniyah">سلێمانی</option>
<option value="Duhok">دهۆک</option>
<option value="Halabja">هەڵەبجە</option>
<option value="Kirkuk">کەرکووک</option>
<option value="Zakho">زاخۆ</option>
<option value="Chamchamal">چەمچەماڵ</option>
<option value="Ranya">ڕانیە</option>
<option value="Koya">کۆیە</option>
<option value="Kalar">کەلار</option>
<option value="Baghdad">بەغداد</option>
<option value="Basra">بەسرە</option>
<option value="Mosul">موسڵ</option>
<option value="Najaf">نەجەف</option>
<option value="Karbala">کەربەلا</option>
</select>

<div class="time">فەجر: <span id="fajr">--:--</span></div>
<div class="time">ظەهر: <span id="dhuhr">--:--</span></div>
<div class="time">عەسر: <span id="asr">--:--</span></div>
<div class="time">مەغریب: <span id="maghrib">--:--</span></div>
<div class="time">عیشا: <span id="isha">--:--</span></div>
</div>

<div class="card"><p id="nextPrayer">...</p></div>
<div class="card"><p id="weather">...</p></div>

<script>
async function getPrayerTimes(){
 const city=document.getElementById("citySelect").value;

 const res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Iraq&method=4`);
 const data=await res.json();

 fajr.innerText=data.data.timings.Fajr;
 dhuhr.innerText=data.data.timings.Dhuhr;
 asr.innerText=data.data.timings.Asr;
 maghrib.innerText=data.data.timings.Maghrib;
 isha.innerText=data.data.timings.Isha;

 document.getElementById("nextPrayer").innerHTML="🕌 شار: "+city;
}
getPrayerTimes();
</script>
</body>
</html>

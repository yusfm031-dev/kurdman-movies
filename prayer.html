<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🕌 نوێژ و کەش و هەوا | KurdMan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020814;
    color:white;
    font-family:"Cairo",sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* ✨ ئەستێرەکان */
body::before{
    content:"✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦ ✦";
    position:fixed;
    top:40px;
    left:0;
    width:100%;
    font-size:18px;
    color:#ffffff;
    letter-spacing:35px;
    opacity:.8;
    animation:twinkle 3s infinite alternate;
    pointer-events:none;
}

@keyframes twinkle{
    from{
        opacity:.3;
    }
    to{
        opacity:1;
    }
}
 /* 🌙 مانگی سەرەوە */
.moon{
    font-size:90px;
    text-align:center;
    margin-top:25px;
    margin-bottom:10px;
    animation:moonGlow 4s infinite alternate;
}

@keyframes moonGlow{
    from{
        filter:brightness(0.9);
    }
    to{
        filter:brightness(1.3);
    }
}

/* 🕌 ناونیشانی نوێژ */
h1{
    text-align:center;
    font-size:42px;
    color:#ffffff;
    margin-bottom:30px;
    font-weight:bold;
    letter-spacing:1px;
}

/* 📍 ناوی شار */
#cityTitle{
    text-align:center;
    font-size:32px;
    color:#d7faff;
    margin:25px 0;
} 
  /* 📍 ناوی شار */
.city-title{
    text-align:center;
    font-size:28px;
    color:#ffffff;
    margin:15px 0;
    font-weight:600;
}

/* 📅 بەروار و ڕۆژ */
.date-box{
    width:100%;
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:14px;
    text-align:center;
    font-size:18px;
    color:#dbeafe;
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.12);
}

/* 🔍 خانەی گەڕان */
.search{
    width:100%;
    background:#0f172a;
    color:#fff;
    border:1px solid #334155;
    border-radius:15px;
    padding:14px;
    font-size:16px;
    margin-bottom:12px;
    outline:none;
}

/* 📋 لیستی شار */
#citySelect{
    width:100%;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
    border-radius:15px;
    padding:14px;
    font-size:16px;
    outline:none;
}

</style>

</head>

<body>

<a class="back-btn" href="index.html">
⬅ گەڕانەوە
</a>
<div class="moon">🌙</div>
<h1>
🕌 نوێژ و کەش و هەوا
</h1>

<div class="card">

<div class="city-title" id="cityTitle">
📍 هەولێر
</div>
 
 <div class="date-box">
  📅 <span id="todayDate">بەروار...</span><br>
  🗓️ <span id="dayName">ڕۆژ...</span>
 </div>

<input 
type="text"
id="searchCity"
class="search"
placeholder="🔍 گەڕان بە ناوی شار...">


<select id="citySelect">

</select>


<div class="time">
<span>🌅 فەجر</span>
<span id="fajr">--:--</span>
</div>


<div class="time">
<span>☀️ ظەهر</span>
<span id="dhuhr">--:--</span>
</div>


<div class="time">
<span>🌇 عەسر</span>
<span id="asr">--:--</span>
</div>


<div class="time">
<span>🌙 مەغریب</span>
<span id="maghrib">--:--</span>
</div>


<div class="time">
<span>🌃 عیشا</span>
<span id="isha">--:--</span>
</div>

</div>
<div class="card">

<h2>⏳ نوێژی داهاتوو</h2>

<p id="nextPrayer">
...
</p>

<p id="countdown">
...
</p>

</div>


<div class="card">

<h2>🌤️ کەش و هەوا</h2>

<p id="weather">
...
</p>
 
</div>


<script>

const days = [
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی",
"شەممە"
];

let today = new Date();

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-GB");

document.getElementById("dayName").innerText =
days[today.getDay()];




const cities = [
{name:"هەولێر", value:"Erbil"},
{name:"سلێمانی", value:"Sulaymaniyah"},
{name:"دهۆک", value:"Duhok"},
{name:"هەڵەبجە", value:"Halabja"},
{name:"کەرکووک", value:"Kirkuk"},
{name:"زاخۆ", value:"Zakho"},
{name:"چەمچەماڵ", value:"Chamchamal"},
{name:"دەربەندیخان", value:"Darbandikhan"},
{name:"ڕانیە", value:"Ranya"},
{name:"کۆیە", value:"Koysinjaq"},
{name:"پێنجوێن", value:"Penjwen"},
{name:"ئاکرێ", value:"Akre"},
{name:"شەقڵاوە", value:"Shaqlawa"},
{name:"چۆمان", value:"Choman"},
{name:"حاجی ئۆمەران", value:"HajiOmaran"},
{name:"بەغدا", value:"Baghdad"},
{name:"بەسرا", value:"Basra"}
];





const citySelect =
document.getElementById("citySelect");


cities.forEach(city => {

let option =
document.createElement("option");

option.value = city.value;

option.textContent = city.name;

citySelect.appendChild(option);

});

 // گەڕان لە ناو شارەکان

document.getElementById("searchCity")
.addEventListener("keyup", function(){

let text = this.value.toLowerCase();

let options = citySelect.options;


for(let option of options){

option.style.display =
option.text.toLowerCase()
.includes(text)
? "block"
: "none";

}

});




// گۆڕینی شار

citySelect.addEventListener("change", ()=>{

getPrayerTimes();

getWeather();

});




// وەرگرتنی کاتەکانی نوێژ



async function getPrayerTimes(){

let city = citySelect.value;

document.getElementById("cityTitle").innerHTML =
"📍 " + citySelect.options[citySelect.selectedIndex].text;


try{

const response = await fetch("prayer-times-v2.json");
const data = await response.json();


let now = new Date();

let dateKey =
String(now.getMonth()+1).padStart(2,"0")
+ "-"
+
String(now.getDate()).padStart(2,"0");


let times = data[city][dateKey];


document.getElementById("fajr").innerText =
times.fajr;

document.getElementById("dhuhr").innerText =
times.dhuhr;

document.getElementById("asr").innerText =
times.asr;

document.getElementById("maghrib").innerText =
times.maghrib;

document.getElementById("isha").innerText =
times.isha;


showNextPrayer({

Fajr: times.fajr,

Dhuhr: times.dhuhr,

Asr: times.asr,

Maghrib: times.maghrib,

Isha: times.isha

});


}

catch(err){

console.log("Prayer JSON Error:", err);

}

 }




// کەش و هەوا

async function getWeather(){

let city = citySelect.value;


const res = await fetch(
`https://wttr.in/${city}?format=%C %t`
);


const weather =
await res.text();


document.getElementById("weather")
.innerHTML =
"🌤️ " + weather;


}

 // نوێژی داهاتوو و کات ماوە

let countdownTimer;

function showNextPrayer(times){

clearInterval(countdownTimer);


const prayers = [

["فەجر", times.Fajr],
["ظەهر", times.Dhuhr],
["عەسر", times.Asr],
["مەغریب", times.Maghrib],
["عیشا", times.Isha]

];


function updateCountdown(){

let now = new Date();

let nextName = "";
let nextDate;


for(let prayer of prayers){


let [hour, minute] =
prayer[1].split(":")
.map(Number);


let date = new Date();

date.setHours(
hour,
minute,
0,
0
);


if(date > now){

nextName = prayer[0];

nextDate = date;

break;

}


}


// ئەگەر هەموو نوێژەکانی ئەمڕۆ تەواو بووبن

if(!nextDate){

let [hour, minute] =
prayers[0][1]
.split(":")
.map(Number);


nextDate = new Date();

nextDate.setDate(
nextDate.getDate()+1
);


nextDate.setHours(
hour,
minute,
0,
0
);


nextName = prayers[0][0];

}


// ماوەی کات

let diff =
nextDate - now;


let hours =
Math.floor(diff/1000/60/60);


let minutes =
Math.floor(
(diff/1000/60)%60
);


document.getElementById("nextPrayer")
.innerHTML =
"🕌 نوێژی داهاتوو: " +
nextName;


document.getElementById("countdown")
.innerHTML =
"⏳ ماوەی ماوە: " +
hours +
" کاتژمێر و " +
minutes +
" خولەک";


}


// یەکجار نیشان بدە

updateCountdown();


// هەر یەک خولەک نوێ بکەرەوە

countdownTimer =
setInterval(
updateCountdown,
60000
);


}




// یەکەم جار بارکردنی داتا

getPrayerTimes();

getWeather();



// هەر 10 خولەک کاتەکان نوێ بکەرەوە

setInterval(()=>{

getPrayerTimes();

getWeather();

},600000);



</script>

</body>

</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Squid Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:sans-serif;
color:white;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:65px;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:9999;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ffd21f;
}

.topbtn{
background:none;
border:none;
color:white;
font-size:30px;
cursor:pointer;
}

.menu{
display:none;
position:fixed;
top:70px;
right:15px;
background:#111;
border-radius:15px;
padding:10px;
z-index:9999;
box-shadow:0 0 20px rgba(0,0,0,.7);
}

.menu a{
display:block;
padding:12px;
color:white;
text-decoration:none;
}

.hero{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scale(0.9);
}

.overlay{
position:absolute;
left:0;
right:0;
bottom:0;
height:80%;
background:linear-gradient(
to top,
rgba(0,0,0,1) 0%,
rgba(0,0,0,.95) 30%,
rgba(0,0,0,.75) 55%,
transparent 100%
);
}

.content{
position:absolute;
left:50%;
top:65%;
transform:translate(-50%,-50%);
width:100%;
text-align:center;
z-index:10;
padding:0 15px;
}

.poster{
width:150px;
height:220px;
object-fit:cover;
border-radius:20px;
border:3px solid #ffd21f;
box-shadow:0 0 20px rgba(255,210,31,.8);
}

.netflix{
display:block;
width:fit-content;
margin:10px auto;
background:#111;
padding:8px 20px;
border-radius:10px;
font-size:20px;
font-weight:bold;
}

.title{
font-size:34px;
font-weight:bold;
margin-top:12px;
}

.desc{
color:#ddd;
margin-top:8px;
}

.tags{
margin-top:15px;
}

.tag{
display:inline-block;
background:#222;
padding:8px 12px;
border-radius:20px;
margin:4px;
font-size:13px;
}

.watch{
display:block;
width:200px;
margin:20px auto;
background:#f5c518;
color:#000;
padding:12px;
border-radius:50px;
font-size:17px;
font-weight:bold;
text-decoration:none;
text-align:center;
}
</style>
</head>

<body>

<div class="topbar">

<button class="topbtn">🔍</button>

<div class="logo">KURDMAN</div>

<button class="topbtn" onclick="toggleMenu()">☰</button>

</div>

<div id="menu" class="menu">

<a href="index.html">🏠 سەرەکی</a>

<a href="movies.html">🎬 فیلمەکان</a>

<a href="series.html">📺 زنجیرەکان</a>

</div>

<div class="hero">

<img class="bg"
src="https://raw.githubusercontent.com/yusfm031-dev/kurdman-movies/main/file_000000009bc872439c938875ddb5602c.png">

<div class="overlay"></div>

<div class="content">

<img class="poster"
src="https://raw.githubusercontent.com/yusfm031-dev/kurdman-movies/main/file_0000000001d0720aa5c16e49ba2a1d95.png">

<div class="netflix">NETFLIX</div>

<div class="title">Squid Game</div>

<div class="desc">زنجیرەی کۆری</div>

<div class="tags">
<span class="tag">⭐ 8.2</span>
<span class="tag">54 خولەک</span>
<span class="tag">2021</span>
<span class="tag">ئەکشن</span>
<span class="tag">دراما</span>
<span class="tag">Kurdistan</span>
</div>

<a href="squidgame.html" class="watch">
▶ بینین
</a>

</div>

</div>

<script>

function toggleMenu(){

var menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

window.addEventListener("scroll",function(){

const bg=document.querySelector(".bg");

let y=window.pageYOffset;

bg.style.transform="translateY("+(y*0.3)+"px)";

});

</script>

</body>
</html>
